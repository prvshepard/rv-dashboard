<!DOCTYPE html>
<!-- 
    PRVS Tech Check-In v1.11
    Released: 2026-03-11
    Features: QR code check-in/out, work notes with voice dictation, direct button access
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Check-In - PRVS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #1e3a8a;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .logo p {
            color: #64748b;
            font-size: 14px;
        }

        .ro-info {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .ro-info h2 {
            color: #1e3a8a;
            font-size: 20px;
            margin-bottom: 15px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
        }

        .info-value {
            color: #1e293b;
            font-size: 14px;
            font-weight: 600;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-badge.checked-out {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-badge.checked-in {
            background: #dcfce7;
            color: #166534;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-start {
            background: #22c55e;
            color: white;
        }

        .btn-start:hover {
            background: #16a34a;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.3);
        }

        .btn-end {
            background: #ef4444;
            color: white;
        }

        .btn-end:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .timer {
            text-align: center;
            padding: 20px;
            background: #fffbeb;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .timer h3 {
            color: #92400e;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .timer-display {
            font-size: 48px;
            font-weight: 700;
            color: #78350f;
            font-family: 'Courier New', monospace;
        }

        .offline-indicator {
            background: #fef3c7;
            color: #92400e;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🚐 PRVS Tech Check-In</h1>
            <p>Patriots RV Services</p>
        </div>

        <div id="app" class="loading">
            Loading RO details...
        </div>
        
        <div style="text-align: center; margin-top: 20px;">
            <span style="font-size: 0.7rem; color: rgba(255,255,255,0.5); font-family: monospace;">v1.11</span>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        // Configuration
        const GOOGLE_CONFIG = {
            CLIENT_ID: '971946834908-fqhmdrie6ntt0mmmbh4rkpaop8edvgr8.apps.googleusercontent.com',
            SPREADSHEET_ID: '1Nkf_BoqDhanJRCyeqIerF-Te_Z_R0h3mZelcgTjS62Y',
            TIME_LOGS_RANGE: 'Time Logs!A:J',
            ADMIN_COMMANDS_RANGE: 'Admin Commands!A:E'
        };
        
        // Admin access control
        const ADMIN_EMAILS = ['roland@patriotsrvservices.com'];
        
        function isAdmin() {
            return currentUser && ADMIN_EMAILS.includes(currentUser.email.toLowerCase());
        }

        let tokenClient;
        let accessToken = null;
        let currentUser = null;
        let roData = null;
        let currentSession = null;
        let timerInterval = null;
        
        // Offline sync queue
        let syncQueue = [];
        let isSyncing = false;
        let isOnline = navigator.onLine;

        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const roId = urlParams.get('ro');
        const customerName = urlParams.get('customer');

        // Initialize
        document.addEventListener('DOMContentLoaded', init);

        function init() {
            console.log('📦 PRVS Tech Check-In v1.11 - Released 2026-03-11');
            console.log('Check-in page loaded for RO:', roId);
            
            if (!roId) {
                showError('No RO specified. Please scan a valid QR code.');
                return;
            }
            
            // Load offline sync queue
            loadSyncQueue();
            
            // Setup online/offline event listeners
            window.addEventListener('online', handleOnline);
            window.addEventListener('offline', handleOffline);

            // Check localStorage first (for offline support)
            loadLocalSession();
            
            // Check if there's a local active session (checked in but not checked out)
            if (currentSession && !currentSession.checkOut) {
                console.log('⚠️ Active session found in localStorage!', currentSession);
                // Show active session screen immediately
                showActiveSessionScreen();
                return;
            }
            
            // No local active session - continue normal flow and check Sheets
            loadRODetailsFromURL();
        }
        
        function handleOnline() {
            console.log('🌐 Connection restored');
            isOnline = true;
            updateSyncStatus();
            
            // Try to sync pending items
            if (syncQueue.length > 0) {
                processSyncQueue();
            }
        }
        
        function handleOffline() {
            console.log('📡 Connection lost');
            isOnline = false;
            updateSyncStatus();
        }
        
        function updateSyncStatus() {
            const statusEl = document.getElementById('syncStatus');
            if (!statusEl) return;
            
            if (!isOnline) {
                statusEl.innerHTML = `
                    <div style="background: #fef3c7; border: 2px solid #f59e0b; padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center;">
                        📡 <strong>Offline</strong> - Changes will sync when online
                        ${syncQueue.length > 0 ? `<br><span style="color: #92400e;">(${syncQueue.length} pending)</span>` : ''}
                    </div>
                `;
            } else if (syncQueue.length > 0) {
                statusEl.innerHTML = `
                    <div style="background: #dbeafe; border: 2px solid #3b82f6; padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center;">
                        🔄 <strong>Syncing...</strong> ${syncQueue.length} item(s)
                    </div>
                `;
            } else {
                statusEl.innerHTML = '';
            }
        }
        
        function showActiveSessionScreen() {
            const app = document.getElementById('app');
            
            // Calculate current elapsed time
            const now = new Date();
            const start = new Date(currentSession.checkIn);
            const elapsedSeconds = Math.floor((now - start) / 1000);
            const formattedTime = formatDuration(elapsedSeconds);
            
            app.innerHTML = `
                <div id="syncStatus"></div>
                ${isAdmin() ? '<div style="background: #fef3c7; border: 2px solid #f59e0b; padding: 8px; border-radius: 8px; margin-bottom: 12px; text-align: center; font-weight: 600; color: #92400e;">👑 Admin Mode Active</div>' : ''}
                <div class="ro-info" style="background: #fef3c7; border: 2px solid #f59e0b; padding: 20px; border-radius: 12px; margin-bottom: 20px;">
                    <h2 style="color: #92400e; margin-bottom: 15px;">⚠️ Already Checked In</h2>
                    <p style="color: #78350f; font-size: 1.1rem; margin-bottom: 20px;">
                        You're already working on this RO!
                    </p>
                    <div class="info-row">
                        <span class="info-label">Started:</span>
                        <span class="info-value">${new Date(currentSession.checkIn).toLocaleTimeString()}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Current Duration:</span>
                        <span class="info-value" style="font-weight: 700; color: #92400e; font-size: 1.3rem;">${formattedTime}</span>
                    </div>
                </div>
                
                <div class="timer">
                    <h3>Time on Job</h3>
                    <div class="timer-display" id="timerDisplay">00:00:00</div>
                </div>
                
                <div class="action-buttons">
                    <button class="btn btn-end" onclick="resumeAndEndWork()">
                        🛑 End Work
                    </button>
                    <button class="btn" onclick="location.reload()" style="background: #6b7280; margin-top: 10px;">
                        🔄 Refresh
                    </button>
                    ${isAdmin() ? `
                        <button class="btn" onclick="clearAllData()" style="background: #dc2626; margin-top: 10px;">
                            🗑️ Clear All Data
                        </button>
                        <button class="btn" onclick="showDebugInfo()" style="background: #7c3aed; margin-top: 10px;">
                            🔍 Debug Info
                        </button>
                    ` : ''}
                </div>
            `;
            
            // Update sync status
            updateSyncStatus();
            
            // Start the timer
            startTimer();
        }
        
        function resumeAndEndWork() {
            // Just call the normal checkout function
            checkOut();
        }
        
        function clearAllData() {
            if (!confirm('⚠️ This will clear ALL data:\n\n• Current session\n• Sync queue\n• All saved data\n\nAre you sure?')) {
                return;
            }
            
            console.log('🗑️ Clearing all localStorage data...');
            
            // Clear everything
            localStorage.clear();
            
            // Reset variables
            currentSession = null;
            syncQueue = [];
            
            alert('✅ All data cleared!\n\nPage will reload.');
            
            // Reload page
            location.reload();
        }
        
        function showDebugInfo() {
            const debugInfo = {
                currentUser: currentUser,
                currentSession: currentSession,
                syncQueue: syncQueue,
                isOnline: isOnline,
                roId: roId,
                roData: roData,
                accessToken: accessToken ? 'Present (hidden)' : 'None',
                localStorageKeys: Object.keys(localStorage),
                localStorageSize: JSON.stringify(localStorage).length
            };
            
            const formatted = JSON.stringify(debugInfo, null, 2);
            
            // Show in alert (mobile-friendly)
            alert('🔍 Debug Info:\n\n' + formatted);
            
            // Also log to console
            console.log('=== DEBUG INFO ===');
            console.log(debugInfo);
            console.log('==================');
        }

        function initGoogleAuth() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CONFIG.CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile',
                callback: handleAuthCallback,
            });
            
            console.log('✅ Token client initialized');
        }
        
        function handleSignInClick() {
            if (!tokenClient) {
                alert('Google Sign-In is still loading. Please wait a moment and try again.');
                return;
            }
            
            console.log('Requesting access token...');
            tokenClient.requestAccessToken();
        }

        function handleAuthCallback(response) {
            if (response.error) {
                console.error('Auth error:', response.error);
                showError('Authentication failed. Please try again.');
                return;
            }
            
            accessToken = response.access_token;
            getCurrentUser();
        }

        async function getCurrentUser() {
            try {
                const response = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                
                if (response.ok) {
                    const userInfo = await response.json();
                    currentUser = {
                        email: userInfo.email,
                        name: userInfo.name || userInfo.email.split('@')[0]
                    };
                    
                    console.log('Logged in as:', currentUser.name);
                    
                    // Check Google Sheets for active session
                    await checkSheetsForActiveSession();
                    
                    // Process any pending sync queue items
                    if (syncQueue.length > 0) {
                        console.log(`📤 Processing ${syncQueue.length} pending sync items...`);
                        processSyncQueue();
                    }
                    
                    // Check for admin commands (remote control)
                    checkAdminCommands();
                    
                    // Then load RO details and render
                    loadRODetails();
                } else {
                    requestSignIn();
                }
            } catch (error) {
                console.error('Error getting user:', error);
                requestSignIn();
            }
        }
        
        async function checkSheetsForActiveSession() {
            if (!accessToken) {
                console.log('No access token, skipping Sheets check');
                return;
            }
            
            try {
                console.log('Checking Time Logs sheet for active session...');
                
                const response = await fetch(
                    `https://sheets.googleapis.com/v4/spreadsheets/${GOOGLE_CONFIG.SPREADSHEET_ID}/values/${GOOGLE_CONFIG.TIME_LOGS_RANGE}`,
                    {
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    }
                );
                
                if (!response.ok) {
                    console.error('Failed to fetch Time Logs:', response.status);
                    return;
                }
                
                const data = await response.json();
                const rows = data.values || [];
                
                if (rows.length <= 1) {
                    console.log('No time logs found');
                    return;
                }
                
                // Check for ANY active session for this user (not just this RO)
                for (let i = rows.length - 1; i >= 1; i--) {
                    const row = rows[i];
                    const logRoId = row[1]; // Column B: RO ID
                    const techEmail = row[2]; // Column C: Tech Email
                    const checkIn = row[4]; // Column E: Check In
                    const checkOut = row[5]; // Column F: Check Out
                    
                    // Found an active session for this user (same user, no checkOut)
                    if (techEmail === currentUser.email && checkIn && !checkOut) {
                        console.log('✅ Found active session in Sheets!', row);
                        
                        // If it's for THIS RO, restore session
                        if (logRoId === roId) {
                            currentSession = {
                                logId: row[0], // Column A: Log ID
                                roId: logRoId,
                                tech: row[3], // Column D: Tech Name
                                techEmail: techEmail,
                                checkIn: checkIn,
                                checkOut: null,
                                rowIndex: i + 1 // Row number in sheet (1-indexed, +1 for header)
                            };
                            
                            // Save to localStorage for offline access
                            saveLocalSession();
                            
                            // Show active session screen
                            showActiveSessionScreen();
                            return;
                        } else {
                            // Active session on DIFFERENT RO - block check-in
                            console.log('⚠️ User has active session on different RO:', logRoId);
                            showBlockedScreen(logRoId);
                            return;
                        }
                    }
                }
                
                console.log('No active session found in Sheets for this user');
                
            } catch (error) {
                console.error('Error checking Sheets for active session:', error);
            }
        }
        
        function showBlockedScreen(activeRoId) {
            document.getElementById('app').innerHTML = `
                <div style="text-align: center; padding: 20px;">
                    <div style="font-size: 4rem; margin-bottom: 20px;">🚫</div>
                    <h2 style="margin-bottom: 20px; color: #dc2626;">Cannot Check In</h2>
                    <p style="margin-bottom: 20px; color: #64748b; font-size: 1.1rem;">
                        You already have an active session on another job:
                    </p>
                    <div style="background: #fee2e2; border: 2px solid #dc2626; border-radius: 8px; padding: 16px; margin-bottom: 24px;">
                        <strong style="color: #991b1b; font-size: 1.2rem;">${activeRoId}</strong>
                    </div>
                    <p style="margin-bottom: 24px; color: #64748b;">
                        Please end your work on that job before starting a new one.
                    </p>
                    <button class="btn btn-start" onclick="location.reload()">
                        Refresh Page
                    </button>
                </div>
            `;
        }
        
        async function checkForAnyActiveSession() {
            try {
                const response = await fetch(
                    `https://sheets.googleapis.com/v4/spreadsheets/${GOOGLE_CONFIG.SPREADSHEET_ID}/values/${GOOGLE_CONFIG.TIME_LOGS_RANGE}`,
                    {
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    }
                );
                
                if (!response.ok) return false;
                
                const data = await response.json();
                const rows = data.values || [];
                
                // Check for ANY active session for this user
                for (let i = rows.length - 1; i >= 1; i--) {
                    const row = rows[i];
                    const logRoId = row[1];
                    const techEmail = row[2];
                    const checkIn = row[4];
                    const checkOut = row[5];
                    
                    if (techEmail === currentUser.email && checkIn && !checkOut) {
                        // Found active session
                        if (logRoId !== roId) {
                            // Active on DIFFERENT job - block!
                            showBlockedScreen(logRoId);
                            return true;
                        }
                        // Active on THIS job is okay (edge case)
                        return false;
                    }
                }
                
                return false; // No active sessions
            } catch (error) {
                console.error('Error checking for active sessions:', error);
                return false; // Allow on error
            }
        }

        function requestSignIn() {
            document.getElementById('app').innerHTML = `
                <div>
                    <h2 style="margin-bottom: 20px; color: #1e3a8a;">Sign In Required</h2>
                    <p style="margin-bottom: 20px; color: #64748b;">Please sign in with your Google account to continue.</p>
                    <button class="btn btn-start" onclick="tokenClient.requestAccessToken()">
                        Sign In with Google
                    </button>
                </div>
            `;
        }

        function loadLocalSession() {
            const savedSession = localStorage.getItem(`session_${roId}`);
            if (savedSession) {
                currentSession = JSON.parse(savedSession);
                console.log('Loaded saved session:', currentSession);
            }
        }

        function saveLocalSession() {
            if (currentSession) {
                localStorage.setItem(`session_${roId}`, JSON.stringify(currentSession));
            } else {
                localStorage.removeItem(`session_${roId}`);
            }
        }
        
        // Offline sync queue management
        function loadSyncQueue() {
            const stored = localStorage.getItem('syncQueue');
            if (stored) {
                syncQueue = JSON.parse(stored);
                console.log(`📋 Loaded ${syncQueue.length} items from sync queue`);
            }
        }
        
        function saveSyncQueue() {
            localStorage.setItem('syncQueue', JSON.stringify(syncQueue));
        }
        
        function addToSyncQueue(operation) {
            syncQueue.push({
                ...operation,
                timestamp: new Date().toISOString(),
                id: `SYNC-${Date.now()}`
            });
            saveSyncQueue();
            console.log('➕ Added to sync queue:', operation);
            updateSyncStatus();
        }

        async function processSyncQueue() {
            if (isSyncing || syncQueue.length === 0 || !accessToken) {
                return;
            }
            
            isSyncing = true;
            console.log(`🔄 Processing sync queue (${syncQueue.length} items)...`);
            updateSyncStatus();
            
            const itemsToProcess = [...syncQueue];
            
            for (let i = 0; i < itemsToProcess.length; i++) {
                const item = itemsToProcess[i];
                
                try {
                    if (item.type === 'checkIn') {
                        await syncCheckInToSheets(item);
                        console.log('✅ Synced check-in:', item.logId);
                    } else if (item.type === 'checkOut') {
                        await syncCheckOutToSheets(item);
                        console.log('✅ Synced check-out:', item.logId);
                    }
                    
                    // Remove from queue after successful sync
                    syncQueue = syncQueue.filter(q => q.id !== item.id);
                    saveSyncQueue();
                    
                } catch (error) {
                    console.error('❌ Failed to sync item:', item, error);
                    // Keep in queue for next attempt
                }
            }
            
            isSyncing = false;
            updateSyncStatus();
            
            if (syncQueue.length === 0) {
                console.log('✅ All items synced successfully!');
            } else {
                console.log(`⚠️ ${syncQueue.length} items remaining in queue`);
            }
        }
        
        async function syncCheckInToSheets(item) {
            const values = [[
                item.logId,
                item.roId,
                item.techEmail,
                item.tech,
                item.checkIn,
                '',
                '',
                item.date
            ]];
            
            const response = await fetch(
                `https://sheets.googleapis.com/v4/spreadsheets/${GOOGLE_CONFIG.SPREADSHEET_ID}/values/${GOOGLE_CONFIG.TIME_LOGS_RANGE}:append?valueInputOption=USER_ENTERED`,
                {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ values })
                }
            );
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            return await response.json();
        }
        
        async function syncCheckOutToSheets(item) {
            let rowIndex = item.rowIndex;
            
            // If no rowIndex, search for the row by logId
            if (!rowIndex) {
                console.log('No rowIndex, searching for row by logId:', item.logId);
                
                try {
                    const response = await fetch(
                        `https://sheets.googleapis.com/v4/spreadsheets/${GOOGLE_CONFIG.SPREADSHEET_ID}/values/${GOOGLE_CONFIG.TIME_LOGS_RANGE}`,
                        {
                            headers: { 'Authorization': `Bearer ${accessToken}` }
                        }
                    );
                    
                    if (response.ok) {
                        const data = await response.json();
                        const rows = data.values || [];
                        
                        // Find the row with matching logId
                        for (let i = 1; i < rows.length; i++) {
                            if (rows[i][0] === item.logId) { // Column A: Log ID
                                rowIndex = i + 1; // Sheet rows are 1-indexed
                                console.log('✅ Found row:', rowIndex, 'for logId:', item.logId);
                                break;
                            }
                        }
                    }
                } catch (error) {
                    console.error('Error searching for row:', error);
                }
            }
            
            if (!rowIndex) {
                console.warn('Could not find row for check-out, skipping:', item.logId);
                return;
            }
            
            const range = `Time Logs!F${rowIndex}:J${rowIndex}`;
            const values = [[item.checkOut, item.duration, '', item.serviceType || '', item.workNotes || '']];
            
            const response = await fetch(
                `https://sheets.googleapis.com/v4/spreadsheets/${GOOGLE_CONFIG.SPREADSHEET_ID}/values/${range}?valueInputOption=USER_ENTERED`,
                {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ values })
                }
            );
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            return await response.json();
        }

        async function checkAdminCommands() {
            if (!accessToken || !currentUser) {
                console.log('No access token or user, skipping Troublemaker check');
                return;
            }
            
            try {
                console.log('🔍 Catching the Troublemaker...');
                
                const response = await fetch(
                    `https://sheets.googleapis.com/v4/spreadsheets/${GOOGLE_CONFIG.SPREADSHEET_ID}/values/${GOOGLE_CONFIG.ADMIN_COMMANDS_RANGE}`,
                    {
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    }
                );
                
                if (!response.ok) {
                    console.log('Admin Commands sheet not accessible or not found');
                    return;
                }
                
                const data = await response.json();
                const rows = data.values || [];
                
                if (rows.length <= 1) {
                    console.log('No troublemakers to catch today');
                    return;
                }
                
                // Check for pending commands for this user
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    const commandId = row[0]; // Column A: ID
                    const techEmail = row[1]; // Column B: Tech Email
                    const command = row[2]; // Column C: Command
                    const status = row[3]; // Column D: Status
                    
                    // Found a pending command for this user
                    if (techEmail === currentUser.email && !status) {
                        console.log('🎯 Troublemaker caught! Executing:', command);
                        
                        // Execute the command
                        await executeAdminCommand(command, commandId, i + 1);
                    }
                }
                
            } catch (error) {
                console.error('Error catching troublemaker:', error);
            }
        }
        
        async function executeAdminCommand(command, commandId, rowIndex) {
            console.log('⚡ Troublemaker Command:', command);
            
            let executed = false;
            
            try {
                switch(command) {
                    case 'CLEAR_CACHE':
                        localStorage.clear();
                        currentSession = null;
                        syncQueue = [];
                        alert('🔧 System Maintenance: Your local data has been cleared.\n\nPage will reload.');
                        executed = true;
                        break;
                        
                    case 'FORCE_SYNC':
                        if (syncQueue.length > 0) {
                            await processSyncQueue();
                            alert('🔧 System Maintenance: Data synchronized successfully.');
                        } else {
                            alert('🔧 System Maintenance: All data is up to date.');
                        }
                        executed = true;
                        break;
                        
                    case 'END_SESSION':
                        if (currentSession && !currentSession.checkOut) {
                            await checkOut();
                            alert('🔧 System Maintenance: Your work session has been closed.');
                        } else {
                            alert('🔧 System Maintenance: No active session found.');
                        }
                        executed = true;
                        break;
                        
                    case 'SHOW_DEBUG':
                        showDebugInfo();
                        executed = true;
                        break;
                        
                    default:
                        console.warn('Unknown Troublemaker command:', command);
                        alert('🔧 System Maintenance: Diagnostic check complete.');
                        executed = true;
                }
                
                // Mark command as completed in sheet
                if (executed) {
                    await markCommandComplete(rowIndex);
                    
                    // Reload page for CLEAR_CACHE
                    if (command === 'CLEAR_CACHE') {
                        setTimeout(() => location.reload(), 1000);
                    }
                }
                
            } catch (error) {
                console.error('Error executing Troublemaker command:', error);
                alert('🔧 System Maintenance: Unable to complete operation.');
            }
        }

        async function checkIn() {
            if (!currentUser) {
                alert('Please sign in first');
                return;
            }
            
            // Check for active sessions on OTHER jobs before allowing check-in
            if (accessToken) {
                const hasActiveSession = await checkForAnyActiveSession();
                if (hasActiveSession) {
                    return; // Blocked by showBlockedScreen
                }
            }
            
            const now = new Date().toISOString();
            const today = new Date().toISOString().split('T')[0];
            const logId = `LOG-${Date.now()}`;
            
            // Capture selected service types at check-in time
            const checkedServicesAtStart = Array.from(document.querySelectorAll('input[name="serviceType"]:checked')).map(cb => cb.value);
            const serviceTypeAtStart = checkedServicesAtStart.join(', ');

            currentSession = {
                logId: logId,
                roId: roId,
                tech: currentUser.name,
                techEmail: currentUser.email,
                checkIn: now,
                checkOut: null,
                serviceType: serviceTypeAtStart
            };
            
            // Save locally first
            saveLocalSession();
            
            // Add to sync queue
            const queueItem = {
                type: 'checkIn',
                logId: logId,
                roId: roId,
                techEmail: currentUser.email,
                tech: currentUser.name,
                checkIn: now,
                date: today
            };
            
            if (!isOnline || !accessToken) {
                // Offline - add to queue
                addToSyncQueue(queueItem);
                alert('⚠️ Offline - Check-in saved locally. Will sync when online.');
                renderInterface();
                return;
            }
            
            console.log('Writing check-in to Google Sheets...');
            
            try {
                const values = [[
                    logId,
                    roId,
                    currentUser.email,
                    currentUser.name,
                    now,
                    '',
                    '',
                    today
                ]];
                
                const response = await fetch(
                    `https://sheets.googleapis.com/v4/spreadsheets/${GOOGLE_CONFIG.SPREADSHEET_ID}/values/${GOOGLE_CONFIG.TIME_LOGS_RANGE}:append?valueInputOption=USER_ENTERED`,
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${accessToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ values })
                    }
                );
                
                if (response.ok) {
                    const result = await response.json();
                    console.log('✅ Check-in saved to Sheets:', result);
                    
                    const updatedRange = result.updates.updatedRange;
                    const rowMatch = updatedRange.match(/!A(\d+)/);
                    if (rowMatch) {
                        currentSession.rowIndex = parseInt(rowMatch[1]);
                        saveLocalSession();
                    }
                    
                    renderInterface();
                } else {
                    // Failed - add to queue
                    console.error('Failed to save to Sheets:', response.status);
                    addToSyncQueue(queueItem);
                    alert('⚠️ Failed to save online. Saved locally - will retry automatically.');
                    renderInterface();
                }
                
            } catch (error) {
                console.error('Error saving to Sheets:', error);
                addToSyncQueue(queueItem);
                alert('⚠️ Connection error. Saved locally - will retry automatically.');
                renderInterface();
            }
        }

        async function checkOut() {
            if (!currentSession) return;
            
            const now = new Date().toISOString();
            const duration = calculateDuration(currentSession.checkIn, now);
            
            // Capture work notes — use serviceType saved at check-in time
            const workNotesEl = document.getElementById('workNotes');
            const workNotes = workNotesEl ? workNotesEl.value.trim() : '';
            const serviceTypeStr = currentSession.serviceType || '';
            
            currentSession.checkOut = now;
            currentSession.duration = duration;
            currentSession.workNotes = workNotes;
            currentSession.serviceType = serviceTypeStr;
            
            // Stop timer and remove visibility listener
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            document.removeEventListener('visibilitychange', handleVisibilityChange);
            
            // Save locally
            saveLocalSession();
            
            // Add to sync queue
            const queueItem = {
                type: 'checkOut',
                logId: currentSession.logId,
                rowIndex: currentSession.rowIndex,
                checkOut: now,
                duration: duration,
                workNotes: workNotes,
                serviceType: serviceTypeStr
            };
            
            if (!isOnline || !accessToken || !currentSession.rowIndex) {
                // Offline or no rowIndex - add to queue
                addToSyncQueue(queueItem);
                alert(`Work session complete!\nDuration: ${formatDuration(duration)}\n\n⚠️ Will sync to Google Sheets when online.`);
                currentSession = null;
                saveLocalSession();
                renderInterface();
                return;
            }
            
            console.log('Updating check-out in Google Sheets...');
            
            try {
                const range = `Time Logs!F${currentSession.rowIndex}:J${currentSession.rowIndex}`;
                const values = [[now, duration, '', serviceTypeStr, workNotes]];
                
                const response = await fetch(
                    `https://sheets.googleapis.com/v4/spreadsheets/${GOOGLE_CONFIG.SPREADSHEET_ID}/values/${range}?valueInputOption=USER_ENTERED`,
                    {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${accessToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ values })
                    }
                );
                
                if (response.ok) {
                    console.log('✅ Check-out saved to Sheets');
                    alert(`Work session complete!\nDuration: ${formatDuration(duration)}`);
                } else {
                    console.error('Failed to update Sheets:', response.status);
                    addToSyncQueue(queueItem);
                    alert(`Work session complete!\nDuration: ${formatDuration(duration)}\n\n⚠️ Failed to sync - will retry automatically.`);
                }
                
            } catch (error) {
                console.error('Error updating Sheets:', error);
                addToSyncQueue(queueItem);
                alert(`Work session complete!\nDuration: ${formatDuration(duration)}\n\n⚠️ Connection error - will retry automatically.`);
            }
            
            currentSession = null;
            saveLocalSession();
            renderInterface();
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            
            const updateTimer = () => {
                const now = new Date();
                const start = new Date(currentSession.checkIn);
                const elapsed = Math.floor((now - start) / 1000);
                
                const hours = Math.floor(elapsed / 3600);
                const minutes = Math.floor((elapsed % 3600) / 60);
                const seconds = elapsed % 60;
                
                const display = `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
                const timerEl = document.getElementById('timerDisplay');
                if (timerEl) {
                    timerEl.textContent = display;
                }
            };
            
            // Update immediately
            updateTimer();
            
            // Only run timer when page is visible
            if (!document.hidden) {
                timerInterval = setInterval(updateTimer, 1000);
            }
            
            // Listen for visibility changes
            document.addEventListener('visibilitychange', handleVisibilityChange);
        }
        
        function handleVisibilityChange() {
            if (document.hidden) {
                // Page is hidden (phone locked, switched apps, etc.)
                console.log('⏸️ Timer paused - page hidden');
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
            } else {
                // Page is visible again
                console.log('▶️ Timer resumed - page visible');
                if (currentSession && !currentSession.checkOut) {
                    // Recalculate from timestamp and restart timer
                    const now = new Date();
                    const start = new Date(currentSession.checkIn);
                    const elapsed = Math.floor((now - start) / 1000);
                    
                    const hours = Math.floor(elapsed / 3600);
                    const minutes = Math.floor((elapsed % 3600) / 60);
                    const seconds = elapsed % 60;
                    
                    const display = `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
                    const timerEl = document.getElementById('timerDisplay');
                    if (timerEl) {
                        timerEl.textContent = display;
                    }
                    
                    // Restart interval
                    timerInterval = setInterval(() => {
                        const now = new Date();
                        const start = new Date(currentSession.checkIn);
                        const elapsed = Math.floor((now - start) / 1000);
                        
                        const hours = Math.floor(elapsed / 3600);
                        const minutes = Math.floor((elapsed % 3600) / 60);
                        const seconds = elapsed % 60;
                        
                        const display = `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
                        const timerEl = document.getElementById('timerDisplay');
                        if (timerEl) {
                            timerEl.textContent = display;
                        }
                    }, 1000);
                }
            }
        }

        function pad(num) {
            return num.toString().padStart(2, '0');
        }
        
        // Voice dictation function for work notes
        function startVoiceDictation() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert('Voice dictation is not supported in this browser. Please use Chrome or Safari.');
                return;
            }
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';
            
            const statusEl = document.getElementById('voiceStatus');
            const notesEl = document.getElementById('workNotes');
            
            recognition.onstart = () => {
                if (statusEl) statusEl.textContent = '🎤 Listening... Speak now.';
                if (statusEl) statusEl.style.color = '#10b981';
            };
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                if (notesEl) {
                    // Append to existing notes with a space
                    const currentText = notesEl.value;
                    notesEl.value = currentText ? `${currentText} ${transcript}` : transcript;
                }
                if (statusEl) {
                    statusEl.textContent = '✅ Transcribed!';
                    statusEl.style.color = '#10b981';
                    setTimeout(() => { statusEl.textContent = ''; }, 3000);
                }
            };
            
            recognition.onerror = (event) => {
                if (statusEl) {
                    statusEl.textContent = `❌ Error: ${event.error}`;
                    statusEl.style.color = '#dc2626';
                    setTimeout(() => { statusEl.textContent = ''; }, 3000);
                }
            };
            
            recognition.onend = () => {
                if (statusEl && statusEl.textContent.includes('Listening')) {
                    statusEl.textContent = '';
                }
            };
            
            try {
                recognition.start();
            } catch (error) {
                if (statusEl) {
                    statusEl.textContent = '❌ Could not start voice recognition';
                    statusEl.style.color = '#dc2626';
                }
            }
        }

        function calculateDuration(start, end) {
            const startTime = new Date(start);
            const endTime = new Date(end);
            return Math.floor((endTime - startTime) / 1000); // Return seconds
        }

        function formatDuration(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            
            if (hours > 0) {
                return `${hours}h ${minutes}m ${secs}s`;
            } else if (minutes > 0) {
                return `${minutes}m ${secs}s`;
            } else {
                return `${secs}s`;
            }
        }

        function showError(message) {
            document.getElementById('app').innerHTML = `
                <div class="error">
                    <strong>Error:</strong> ${message}
                </div>
            `;
        }
    </script>
</body>
</html>
