<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Check-In - PRVS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #1e3a8a;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .logo p {
            color: #64748b;
            font-size: 14px;
        }

        .ro-info {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .ro-info h2 {
            color: #1e3a8a;
            font-size: 20px;
            margin-bottom: 15px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
        }

        .info-value {
            color: #1e293b;
            font-size: 14px;
            font-weight: 600;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-badge.checked-out {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-badge.checked-in {
            background: #dcfce7;
            color: #166534;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-start {
            background: #22c55e;
            color: white;
        }

        .btn-start:hover {
            background: #16a34a;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.3);
        }

        .btn-end {
            background: #ef4444;
            color: white;
        }

        .btn-end:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .timer {
            text-align: center;
            padding: 20px;
            background: #fffbeb;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .timer h3 {
            color: #92400e;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .timer-display {
            font-size: 48px;
            font-weight: 700;
            color: #78350f;
            font-family: 'Courier New', monospace;
        }

        .offline-indicator {
            background: #fef3c7;
            color: #92400e;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🚐 PRVS Tech Check-In</h1>
            <p>Patriots RV Services</p>
        </div>

        <div id="app" class="loading">
            Loading RO details...
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        // Configuration
        const GOOGLE_CONFIG = {
            CLIENT_ID: '971946834908-fqhmdrie6ntt0mmmbh4rkpaop8edvgr8.apps.googleusercontent.com',
            SPREADSHEET_ID: '1Nkf_BoqDhanJRCyeqIerF-Te_Z_R0h3mZelcgTjS62Y'
        };

        let tokenClient;
        let accessToken = null;
        let currentUser = null;
        let roData = null;
        let currentSession = null;
        let timerInterval = null;

        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const roId = urlParams.get('ro');
        const customerName = urlParams.get('customer');

        // Initialize
        document.addEventListener('DOMContentLoaded', init);

        function init() {
            console.log('Check-in page loaded for RO:', roId);
            
            if (!roId) {
                showError('No RO specified. Please scan a valid QR code.');
                return;
            }

            // Check for saved session FIRST
            loadLocalSession();
            
            // Check if there's an active session (checked in but not checked out)
            if (currentSession && !currentSession.checkOut) {
                console.log('⚠️ Active session found!', currentSession);
                // Show active session screen immediately
                showActiveSessionScreen();
                return; // Don't continue with normal flow
            }
            
            // No active session - continue normal flow
            loadRODetailsFromURL();
        }
        
        function showActiveSessionScreen() {
            const app = document.getElementById('app');
            
            // Calculate current elapsed time
            const now = new Date();
            const start = new Date(currentSession.checkIn);
            const elapsedSeconds = Math.floor((now - start) / 1000);
            const formattedTime = formatDuration(elapsedSeconds);
            
            app.innerHTML = `
                <div class="ro-info" style="background: #fef3c7; border: 2px solid #f59e0b; padding: 20px; border-radius: 12px; margin-bottom: 20px;">
                    <h2 style="color: #92400e; margin-bottom: 15px;">⚠️ Already Checked In</h2>
                    <p style="color: #78350f; font-size: 1.1rem; margin-bottom: 20px;">
                        You're already working on this RO!
                    </p>
                    <div class="info-row">
                        <span class="info-label">Started:</span>
                        <span class="info-value">${new Date(currentSession.checkIn).toLocaleTimeString()}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Current Duration:</span>
                        <span class="info-value" style="font-weight: 700; color: #92400e; font-size: 1.3rem;">${formattedTime}</span>
                    </div>
                </div>
                
                <div class="timer">
                    <h3>Time on Job</h3>
                    <div class="timer-display" id="timerDisplay">00:00:00</div>
                </div>
                
                <div class="action-buttons">
                    <button class="btn btn-end" onclick="resumeAndEndWork()">
                        🛑 End Work
                    </button>
                    <button class="btn" onclick="location.reload()" style="background: #6b7280; margin-top: 10px;">
                        🔄 Refresh
                    </button>
                </div>
            `;
            
            // Start the timer
            startTimer();
        }
        
        function resumeAndEndWork() {
            // Just call the normal checkout function
            checkOut();
        }

        function initGoogleAuth() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CONFIG.CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile',
                callback: handleAuthCallback,
            });
            
            console.log('✅ Token client initialized');
        }
        
        function handleSignInClick() {
            if (!tokenClient) {
                alert('Google Sign-In is still loading. Please wait a moment and try again.');
                return;
            }
            
            console.log('Requesting access token...');
            tokenClient.requestAccessToken();
        }

        function handleAuthCallback(response) {
            if (response.error) {
                console.error('Auth error:', response.error);
                showError('Authentication failed. Please try again.');
                return;
            }
            
            accessToken = response.access_token;
            getCurrentUser();
        }

        async function getCurrentUser() {
            try {
                const response = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                
                if (response.ok) {
                    const userInfo = await response.json();
                    currentUser = {
                        email: userInfo.email,
                        name: userInfo.name || userInfo.email.split('@')[0]
                    };
                    
                    console.log('Logged in as:', currentUser.name);
                    loadRODetails();
                } else {
                    requestSignIn();
                }
            } catch (error) {
                console.error('Error getting user:', error);
                requestSignIn();
            }
        }

        function requestSignIn() {
            document.getElementById('app').innerHTML = `
                <div>
                    <h2 style="margin-bottom: 20px; color: #1e3a8a;">Sign In Required</h2>
                    <p style="margin-bottom: 20px; color: #64748b;">Please sign in with your Google account to continue.</p>
                    <button class="btn btn-start" onclick="tokenClient.requestAccessToken()">
                        Sign In with Google
                    </button>
                </div>
            `;
        }

        function loadLocalSession() {
            const savedSession = localStorage.getItem(`session_${roId}`);
            if (savedSession) {
                currentSession = JSON.parse(savedSession);
                console.log('Loaded saved session:', currentSession);
            }
        }

        function saveLocalSession() {
            if (currentSession) {
                localStorage.setItem(`session_${roId}`, JSON.stringify(currentSession));
            } else {
                localStorage.removeItem(`session_${roId}`);
            }
        }

        function loadRODetailsFromURL() {
            console.log('loadRODetailsFromURL called');
            console.log('roId:', roId);
            console.log('customerName:', customerName);
            
            // Extract customer name from RO ID (format: RO-Customer-Name-Date)
            let extractedCustomer = 'Unknown Customer';
            if (roId && roId.startsWith('RO-')) {
                const parts = roId.split('-');
                console.log('RO ID parts:', parts);
                if (parts.length >= 2) {
                    // Reconstruct customer name from parts (everything except RO and last part which is date)
                    extractedCustomer = parts.slice(1, -1).join(' ');
                }
            }
            
            console.log('Extracted customer:', extractedCustomer);
            
            // Set RO data from URL
            roData = {
                id: roId,
                customer: customerName || extractedCustomer,
                status: 'In Progress',
                repairType: 'Various'
            };
            
            console.log('RO Data set to:', roData);
            
            // Render interface immediately with RO data (before auth)
            renderInterface();
            
            // Wait for Google API to load, then initialize auth
            waitForGoogleAPI();
        }
        
        function waitForGoogleAPI() {
            if (typeof google !== 'undefined' && google.accounts) {
                console.log('✅ Google API loaded, initializing auth');
                initGoogleAuth();
                
                // Re-render to show sign-in button
                setTimeout(() => {
                    renderInterface();
                }, 100);
            } else {
                console.log('⏳ Google API not loaded yet, retrying in 500ms...');
                setTimeout(waitForGoogleAPI, 500);
            }
        }

        async function loadRODetails() {
            // This function is now called AFTER auth
            // roData is already set from loadRODetailsFromURL
            renderInterface();
        }

        function renderInterface() {
            console.log('renderInterface called');
            console.log('roData:', roData);
            console.log('currentUser:', currentUser);
            
            const isCheckedIn = currentSession && !currentSession.checkOut;
            
            let html = `
                <div class="ro-info">
                    <h2>🚐 ${roData ? roData.customer || 'Unknown Customer' : 'Loading...'}</h2>
                    <div class="info-row">
                        <span class="info-label">RO ID:</span>
                        <span class="info-value">${roData ? roData.id : 'N/A'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Status:</span>
                        <span class="info-value">${roData ? roData.status : 'N/A'}</span>
                    </div>
                    ${currentUser ? `
                    <div class="info-row">
                        <span class="info-label">Tech:</span>
                        <span class="info-value">${currentUser.name}</span>
                    </div>
                    ` : ''}
                    <div class="info-row">
                        <span class="info-label">Work Status:</span>
                        <span class="status-badge ${isCheckedIn ? 'checked-in' : 'checked-out'}">
                            ${isCheckedIn ? '✓ Checked In' : 'Checked Out'}
                        </span>
                    </div>
                </div>
            `;

            if (isCheckedIn) {
                html += `
                    <div class="timer">
                        <h3>Time on Job</h3>
                        <div class="timer-display" id="timerDisplay">00:00:00</div>
                    </div>
                `;
            }

            if (!navigator.onLine) {
                html += `
                    <div class="offline-indicator">
                        ⚠️ Offline - Changes will sync when online
                    </div>
                `;
            }

            html += `
                <div class="action-buttons">
                    ${!currentUser ? `
                        <div class="auth-prompt">
                            <p>Please sign in to check in/out</p>
                            <button class="btn btn-start" onclick="handleSignInClick()" id="signInBtn">
                                Sign In with Google
                            </button>
                        </div>
                    ` : (isCheckedIn ? `
                        <button class="btn btn-end" onclick="checkOut()">
                            ⏹️ End Work
                        </button>
                    ` : `
                        <button class="btn btn-start" onclick="checkIn()">
                            ▶️ Start Work
                        </button>
                    `)}
                </div>
            `;

            document.getElementById('app').innerHTML = html;

            if (isCheckedIn) {
                startTimer();
            }
        }

        function checkIn() {
            currentSession = {
                roId: roId,
                tech: currentUser.name,
                techEmail: currentUser.email,
                checkIn: new Date().toISOString(),
                checkOut: null
            };
            
            saveLocalSession();
            syncToSheets();
            renderInterface();
        }

        function checkOut() {
            if (!currentSession) return;
            
            currentSession.checkOut = new Date().toISOString();
            const duration = calculateDuration(currentSession.checkIn, currentSession.checkOut);
            currentSession.duration = duration;
            
            // Stop timer and remove visibility listener
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            document.removeEventListener('visibilitychange', handleVisibilityChange);
            
            saveLocalSession();
            syncToSheets();
            
            // Show completion message
            alert(`Work session complete!\nDuration: ${formatDuration(duration)}`);
            
            currentSession = null;
            saveLocalSession();
            renderInterface();
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            
            const updateTimer = () => {
                const now = new Date();
                const start = new Date(currentSession.checkIn);
                const elapsed = Math.floor((now - start) / 1000);
                
                const hours = Math.floor(elapsed / 3600);
                const minutes = Math.floor((elapsed % 3600) / 60);
                const seconds = elapsed % 60;
                
                const display = `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
                const timerEl = document.getElementById('timerDisplay');
                if (timerEl) {
                    timerEl.textContent = display;
                }
            };
            
            // Update immediately
            updateTimer();
            
            // Only run timer when page is visible
            if (!document.hidden) {
                timerInterval = setInterval(updateTimer, 1000);
            }
            
            // Listen for visibility changes
            document.addEventListener('visibilitychange', handleVisibilityChange);
        }
        
        function handleVisibilityChange() {
            if (document.hidden) {
                // Page is hidden (phone locked, switched apps, etc.)
                console.log('⏸️ Timer paused - page hidden');
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
            } else {
                // Page is visible again
                console.log('▶️ Timer resumed - page visible');
                if (currentSession && !currentSession.checkOut) {
                    // Recalculate from timestamp and restart timer
                    const now = new Date();
                    const start = new Date(currentSession.checkIn);
                    const elapsed = Math.floor((now - start) / 1000);
                    
                    const hours = Math.floor(elapsed / 3600);
                    const minutes = Math.floor((elapsed % 3600) / 60);
                    const seconds = elapsed % 60;
                    
                    const display = `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
                    const timerEl = document.getElementById('timerDisplay');
                    if (timerEl) {
                        timerEl.textContent = display;
                    }
                    
                    // Restart interval
                    timerInterval = setInterval(() => {
                        const now = new Date();
                        const start = new Date(currentSession.checkIn);
                        const elapsed = Math.floor((now - start) / 1000);
                        
                        const hours = Math.floor(elapsed / 3600);
                        const minutes = Math.floor((elapsed % 3600) / 60);
                        const seconds = elapsed % 60;
                        
                        const display = `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
                        const timerEl = document.getElementById('timerDisplay');
                        if (timerEl) {
                            timerEl.textContent = display;
                        }
                    }, 1000);
                }
            }
        }

        function pad(num) {
            return num.toString().padStart(2, '0');
        }

        function calculateDuration(start, end) {
            const startTime = new Date(start);
            const endTime = new Date(end);
            return Math.floor((endTime - startTime) / 1000); // Return seconds
        }

        function formatDuration(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            
            if (hours > 0) {
                return `${hours}h ${minutes}m ${secs}s`;
            } else if (minutes > 0) {
                return `${minutes}m ${secs}s`;
            } else {
                return `${secs}s`;
            }
        }

        async function syncToSheets() {
            // TODO: Write to Time Logs sheet
            console.log('Syncing to sheets:', currentSession);
            
            // For now, just save locally
            // Will implement Google Sheets API call next
        }

        function showError(message) {
            document.getElementById('app').innerHTML = `
                <div class="error">
                    <strong>Error:</strong> ${message}
                </div>
            `;
        }
    </script>
</body>
</html>
