<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRVS Check-In Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #1a1a1a;
            color: white;
        }
        .box {
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            font-size: 14px;
        }
        .gray { background: #555; }
        .yellow { background: #cc0; color: black; }
        .green { background: #0c0; color: black; }
        .blue { background: #00f; }
        .red { background: #c00; }
    </style>
</head>
<body>
    <h1>🚐 PRVS Tech Check-In (TEST)</h1>
    
    <div id="app">
        <div class="box gray">Initial HTML loaded</div>
    </div>

    <script>
        console.log('=== SCRIPT STARTED ===');
        
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const roId = urlParams.get('ro');
        const customerName = urlParams.get('customer');
        
        console.log('URL:', window.location.href);
        console.log('RO ID:', roId);
        console.log('Customer:', customerName);
        
        // Run on page load
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM Content Loaded');
            
            const app = document.getElementById('app');
            
            app.innerHTML += `<div class="box yellow">✅ JavaScript is running!</div>`;
            app.innerHTML += `<div class="box gray">URL: ${window.location.href}</div>`;
            app.innerHTML += `<div class="box green">RO ID: ${roId || 'NOT FOUND'}</div>`;
            app.innerHTML += `<div class="box blue">Customer: ${customerName || 'NOT FOUND'}</div>`;
            
            if (!roId) {
                app.innerHTML += `<div class="box red">❌ ERROR: No RO ID in URL. The URL should have ?ro=RO-Name-Date</div>`;
            } else {
                // Extract customer from RO ID
                const parts = roId.split('-');
                const extractedCustomer = parts.slice(1, -1).join(' ');
                
                app.innerHTML += `<div class="box green">✅ Extracted Customer: ${extractedCustomer}</div>`;
                app.innerHTML += `<div class="box green">✅ SUCCESS! Page is working correctly.</div>`;
            }
        });
        
        console.log('=== SCRIPT ENDED ===');
    </script>
</body>
</html>
