    const hasRedVision = (accessoryQtys['redvision_rogue']||0)>0 || (accessoryQtys['redvision_prime']||0)>0;
    const hasSmartShunt = (accessoryQtys['smartshunt_500']||0)>0;
    const hasGxTouch = (accessoryQtys['gx_touch_50']||0)>0 || (accessoryQtys['gx_touch_70']||0)>0;
    const hasGxTank = (accessoryQtys['gx_tank_140']||0)>0;
    const eliteCommsChecklist = Object.keys(batteryQtys).some(id=>(batteryQtys[id]||0)>0 && PRODUCTS.batteries.find(x=>x.id===id)?.victronComms);
    const battV = (() => { const id=Object.keys(batteryQtys).find(id=>batteryQtys[id]>0); return id?PRODUCTS.batteries.find(x=>x.id===id)?.voltage||12:12; })();
    const battAhTotal = (() => { let total=0; Object.keys(batteryQtys).forEach(id=>{ const q=batteryQtys[id]||0; const b=PRODUCTS.batteries.find(x=>x.id===id); if(b&&q>0) total+=b.ah*q; }); return total; })();
    const invId = Object.keys(inverterQtys).find(id=>inverterQtys[id]>0);
    const inv = invId ? PRODUCTS.inverters.find(x=>x.id===invId) : null;
    const invQ = inv ? (inverterQtys[invId]||1) : 0;
    const shoreAmpsChk = Number(survey.shoreService)||30;
    const is50A = shoreAmpsChk >= 50;
    const totalPanelWatts = (() => { let w=0; Object.keys(panelQtys).forEach(id=>{ const q=panelQtys[id]||0; const p=PRODUCTS.panels.find(x=>x.id===id); if(p&&q>0) w+=p.watts*q; }); return w; })();
    const totalPanelCount = Object.keys(panelQtys).reduce((s,id)=>s+(panelQtys[id]||0),0);
    const coachLabel = [coachInfo.year,coachInfo.make,coachInfo.model].filter(Boolean).join(" ") || "RV";
    const battBrand = (() => { const id=Object.keys(batteryQtys).find(id=>batteryQtys[id]>0); return id?PRODUCTS.batteries.find(x=>x.id===id)?.brand||"Battery":"Battery"; })();
    const battModel = (() => { const id=Object.keys(batteryQtys).find(id=>batteryQtys[id]>0); return id?PRODUCTS.batteries.find(x=>x.id===id)?.model||"":""; })();
    const lvAbsorb = battV===48?"57.6":battV===24?"28.4":"14.2";
    const lvFloat = battV===48?"54.0":battV===24?"27.0":"13.5";

    checks.push({ section:"Pre-Wiring Safety", items:[
      { text:"Battery disconnect switch in OFF position before any wiring begins", critical:true },
      { text:"Confirm system voltage (" + battV + "V) matches across all batteries, inverter, and MPPT controllers", critical:true },
      { text:"All AC breakers OFF and shore power cord unplugged", critical:true },
      { text:"Verify battery state of charge >= 20% before initial connection", critical:false },
      { text:"Inspect all cable insulation for nicks, abrasion damage, or exposed copper", critical:true },
      { text:"Torque spec reference taped inside battery compartment", critical:false },
    ]});

    if (hasLynxPowerIn || hasLynxDist || hasLynxShnt) {
      checks.push({ section:"Victron Lynx Busbar Chain", items:[
        { text:eliteCommsChecklist
            ? "Chain order: Battery(+) -> Lynx Power In -> Lynx Distributor -> Loads  (Epoch Elite uses VE.Direct for comms, Lynx Shunt not required)"
            : "Chain order: Battery(+) -> Lynx Power In -> Lynx Shunt VE.Can -> Lynx Distributor -> Loads",
          critical:true },
        { text:"All Lynx M10 busbar bolts torqued to 20-25 Nm with calibrated torque wrench", critical:true },
        { text:"VE.Can termination resistors on FIRST and LAST device in chain", critical:true },
        { text:"Lynx module bus connectors fully clicked and seated before torquing covers", critical:true },
        { text:"Mega fuses rated correctly per load (verify each slot vs wire amp rating)", critical:true },
        { text:"All unused Lynx port covers installed", critical:false },
        { text:"Lynx chain physically secured against vibration", critical:false },
      ]});
    }

    if (totalBattQ > 0) {
      checks.push({ section:"Battery Bank: " + totalBattQ + "x " + battBrand + " " + battModel + " (" + battAhTotal + "Ah @ " + battV + "V)", items:[
        { text:"All " + totalBattQ + " battery inter-connect cables cut to exactly equal length (parallel balance)", critical:true },
        { text:"All battery terminals clean and corrosion-free before connecting lugs", critical:true },
        { text:"Battery polarity (+/-) verified before connecting to Lynx Power In", critical:true },
        { text:"Battery bank fused within 18in of positive terminal (ABYC E-11)", critical:true },
        { text:eliteCommsChecklist ? "VE.Direct cable connected between each Epoch Elite and Cerbo GX" : "BMS CAN or VE.Can cable connected from BMS to Cerbo GX or MPPT", critical:true },
        { text:"Battery cell voltage balanced within 0.05V across all cells before first charge", critical:false },
        { text:"Verify BMS low-voltage cutoff set to manufacturer spec (Epoch: 10.5V at 12V)", critical:true },
        { text:"Battery compartment ventilation adequate", critical:false },
      ]});
    }

    if (inv) {
      const dcTorque = inv.voltage===48?"50Nm":inv.voltage===24?"30Nm":"22Nm";
      checks.push({ section:(invQ > 1 ? invQ + "x " : "") + "Inverter/Charger: " + inv.model + " (" + inv.voltage + "V DC / " + inv.va + "VA)", items:[
        { text:"DC input voltage reads " + battV + "V at inverter terminals before power-on", critical:true },
        { text:"DC cable lugs torqued to spec (" + dcTorque + " typical on M8 terminals)", critical:true },
        { text:"AC output wiring polarity: L1 (black), Neutral (white), Ground (green)", critical:true },
        { text:"AC input current limit set to " + shoreAmpsChk + "A (" + (is50A ? "50A service" : "30A service") + ")", critical:true },
        { text:"Battery charge voltages: Absorption " + lvAbsorb + "V, Float " + lvFloat + "V (LiFePO4 @ " + battV + "V)", critical:true },
        { text:inv.charger ? "Charge current limit: " + Math.round(inv.charger*0.9) + "A (90% of rated " + inv.charger + "A)" : "Charge current limit set per battery spec", critical:false },
        { text:"AC transfer switch tested: inverter to shore handoff clean (< 20ms)", critical:false },
        { text:"Test inverter: 120V AC output verified under real load", critical:false },
        { text:hasCerboChk ? "VE.Bus cable connected to Cerbo GX and inverter appearing in overview" : "Inverter visible in VictronConnect via Bluetooth", critical:false },
      ]});
    }

    if (totalMpptQ > 0) {
      const mpptList = Object.keys(mpptQtys).filter(id=>mpptQtys[id]>0).map(id=>{ const m=PRODUCTS.mppTs.find(x=>x.id===id); return m?(mpptQtys[id]+"x "+m.model):id; }).join(", ");
      checks.push({ section:"MPPT Solar: " + mpptList, items:[
        { text:"Solar panels covered or disconnected BEFORE connecting MPPT to battery", critical:true },
        { text:"PV polarity verified with multimeter before final connection", critical:true },
        { text:"PV open-circuit voltage (Voc) within MPPT rated input max", critical:true },
        { text:"MPPT battery voltage setting matches bank (" + battV + "V)", critical:true },
        { text:"Charge algorithm set to LiFePO4 (not AGM or Gel)", critical:true },
        { text:"MPPT NOT in equalization mode", critical:true },
        { text:hasCerboChk ? "VE.Direct cable connected to Cerbo GX for each MPPT" : "VE.Direct or Bluetooth monitoring verified in VictronConnect", critical:false },
        { text:"Solar array wiring secured with UV-rated clips", critical:false },
      ]});
    }

    if (totalPanelCount > 0) {
      checks.push({ section:"Solar Array: " + totalPanelCount + " panels / " + totalPanelWatts + "W", items:[
        { text:"All panel mounting hardware torqued and thread-locked against road vibration", critical:true },
        { text:"6in minimum clearance maintained around all roof obstacles (A/C, vents)", critical:true },
        { text:"MC4 connectors fully clicked and locked — tug-test each one", critical:true },
        { text:"Panel frames bonded to roof structure (NEC/ABYC grounding)", critical:true },
        { text:"Wiring roof penetration waterproofed with self-leveling sealant or cable gland", critical:true },
        { text:"No wiring over sharp edges or adjacent to heat sources", critical:false },
      ]});
    }

    if (hasBcdc && bcdcProd) {
      checks.push({ section:"REDARC BCDC DC-DC Charger: " + bcdcProd.model, items:[
        { text:"BCDC input fused within 12in of chassis/alternator positive terminal", critical:true },
        { text:"BCDC output fused within 12in of house battery positive terminal", critical:true },
        { text:"Sense wire connected to vehicle (starter) battery positive, not house battery", critical:true },
        { text:"Battery type profile set to LiFePO4 (or correct profile for battery chemistry)", critical:true },
        { text:"Verify BCDC does NOT charge when vehicle is OFF (no parasitic draw)", critical:true },
        { text:"BCDC begins charging within 60 seconds of engine start at >13.2V alternator output", critical:false },
        { text:"BCDC mounted with 50mm clearance on all sides for airflow", critical:false },
      ]});
    }

    if (hasOrionXS50 || hasOrionXS1400) {
      const orionModel = hasOrionXS1400 ? "Orion XS 1400" : "Orion XS 12/12-50";
      checks.push({ section:"Victron " + orionModel + " DC-DC Charger", items:[

        { text:"Unit initiates charge within 3 minutes of ignition-on signal", critical:false },

    }

    if (hasManager30) {
      checks.push({ section:"REDARC Manager30 BMS", items:[
        { text:"Manager30 DIP switches set to LiFePO4 battery type position", critical:true },
        { text:"All charge source inputs wired correctly per REDARC wiring guide (solar, DC-DC, shore)", critical:true },

        { text:"Auxiliary battery sensor wire connected to battery positive", critical:false },
        { text:"Test all charge sources individually: BULK > ABS > FLOAT cycle confirmed", critical:false },

    if (hasRedVision) {
      checks.push({ section:"REDARC RedVision Monitoring", items:[
        { text:"All RedVision shunts installed in correct polarity orientation", critical:true },
        { text:"RedVision Gateway paired to mobile app or display", critical:false },
        { text:"Battery capacity set correctly in RedVision app (Ah value)", critical:true },
        { text:"Alerts configured: low SoC (<20%), high temp, charge fault", critical:false },
      ]});
    }

    if (hasSmartShunt && !hasCerboChk) {
      checks.push({ section:"Victron SmartShunt 500A", items:[
        { text:"SmartShunt installed on MAIN negative conductor only (all DC negatives return through shunt)", critical:true },
        { text:"Auxiliary port connected to starter battery for dual voltage monitoring", critical:false },
        { text:"Battery capacity (Ah) and Peukert exponent set correctly in VictronConnect", critical:true },
        { text:"Charged voltage set to " + (battV===48?"57.0":battV===24?"27.0":"13.2") + "V for LiFePO4 SoC reset", critical:true },
        { text:"Bluetooth pairing confirmed, SoC reading visible in VictronConnect app", critical:false },
      ]});
    }

    if (hasCerboChk) {
      checks.push({ section:"Cerbo GX" + (hasGxTouch ? " + GX Touch" : "") + " / VRM", items:[
        { text:"All VE.Direct and VE.Can devices appearing on Cerbo overview screen", critical:true },
        { text:"DVCC enabled (required for LiFePO4 with Cerbo)", critical:true },
        { text:"Battery monitor source: " + (eliteCommsChecklist ? "Epoch Elite via VE.Direct" : "Lynx Shunt VE.Can"), critical:true },
        { text:"System voltage configured to " + battV + "V in Cerbo settings", critical:true },
        { text:"VRM portal online, data flowing, unit registered", critical:false },
        { text:"Charged voltage and Tail current set for accurate SoC reset", critical:false },
        { text:"VRM alarms enabled: low SoC, high battery temp, grid lost", critical:false },
        { text:hasGxTouch ? "GX Touch display secured, cable routed, touchscreen responsive" : "Cerbo WiFi/Bluetooth verified for remote access", critical:false },
        { text:hasGxTank ? "GX Tank 140 sender calibrated (full and empty levels set)" : "", critical:false },
      ].filter(item=>item.text)});
    }

    if (is50A || survey.shoreService) {
      checks.push({ section:(is50A ? "50A" : "30A") + " Shore Power Connection", items:[
        { text:(is50A ? "50A inlet: L1/L2/Neutral/Ground wiring correct (double-pole 240V feed)" : "30A inlet: L1/Neutral/Ground wiring correct"), critical:true },
        { text:"Shore power inlet weatherproof cover installed, gasket seated and sealing", critical:true },
        { text:"Inlet ground conductor bonded to chassis ground at main AC panel", critical:true },
        { text:"GFCI outlets in bath/kitchen verified with test button", critical:false },
        { text:"AC panel breakers labeled to match outlet and appliance layout", critical:false },
        { text:"Shore-to-inverter transfer: unplug shore, verify inverter picks up all loads", critical:false },
      ]});
    }

    if (wireRuns.length > 0) {
      checks.push({ section:"Cable Runs: " + wireRuns.length + " logged runs", items:[
        ...wireRuns.map((r,idx) => ({
          text:"Run " + (idx+1) + (r.label ? " (" + r.label + ")" : "") + ": " + r.strands + "x " + r.awg + " AWG, " + r.feet + "ft -- verify lug crimp, heat shrink, and fuse at source",
          critical:true
        })),
        { text:"All cable runs secured with appropriate clamps or loom -- no loose hanging wire", critical:true },
        { text:"Voltage drop verified on critical runs (target <3% at full rated current)", critical:false },
      ]});
    }

    checks.push({ section:"Final Commission Test: " + coachLabel, items:[
      { text:"Load test at 50% system capacity for 30 minutes -- thermal check all connections", critical:true },
      { text:"IR thermometer check: all lugs and busbar connections <10C above ambient", critical:true },
      { text:inv ? "AC load test: run " + (is50A ? "two AC units" : "main AC") + " on inverter 15 min -- no fault codes" : "DC load test: all 12V loads operate correctly on battery", critical:true },
      { text:"Shore power cycle tested: plug in (charging starts), unplug (inverter takes over)", critical:false },
      { text:"All cable management clamps tight -- no chafing against metal edges or moving parts", critical:true },
      { text:"All serial numbers, firmware versions, and commissioning date documented", critical:false },
      { text:"Customer walkthrough: " + (hasCerboChk ? "VRM app, Cerbo overview, " : "") + "emergency disconnect, basic operation", critical:true },
      { text:"Laminated system summary (voltages, fuse map, shop contact) left in battery compartment", critical:false },
    ]});

    return checks;
  })();

                          {cable && <div className="wire-run-use">{run.strands}× {run.awg} · {run.feet} ft · {cable.use}</div>}
                        </div>

                        return (

                            </div>
                            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                              <div style={{display:"flex",flexDirection:"column",gap:2}}>

                                <div style={{fontSize:13,fontWeight:700,color:"var(--accent3)",fontFamily:"'Roboto Mono',monospace"}}>{kwh.toFixed(2)} kWh</div>
                                <div style={{fontSize:10,color:"var(--muted)",fontFamily:"'Roboto Mono',monospace"}}>{dcA.toFixed(1)}A DC</div>
                              </div>
                            </div>
                          </div>

                    </div>
                  </div>
                </div>

                {loads.length > 0 && (

                      {label:"Peak Draw",val:(peakW+" W"),sub:"Simultaneous max",color:"var(--accent2)"},
                      {label:"Rec Battery Bank",val:(recBattKwh+" kWh"),sub:"2-day autonomy, 80% DoD",color:"var(--accent3)"},
                      {label:"Rec Inverter Size",val:(recInvW+"W"),sub:"1.2× peak load safety",color:"var(--accent)"},
                      {label:"Rec Solar Array",val:(recSolarW+"W"),sub:"4 peak sun hrs, 80% eff",color:"var(--accent2)"},

                {loads.length > 0 && totalBattKwh > 0 && (

                      {[
                        {label:"Battery Bank",need:recBattKwh,have:+totalBattKwh.toFixed(2),unit:"kWh"},
                        {label:"Inverter",need:recInvW,have:totalInvW,unit:"W"},
                        {label:"Solar Array",need:recSolarW,have:totalSolarW,unit:"W"},
                      ].map((row,i)=>{
                        const ok = row.have >= row.need;
                        const pct = row.need > 0 ? Math.min(100, Math.round(row.have/row.need*100)) : 100;
                        return (
                          <div key={i} style={{background:"var(--panel)",border:"1px solid var(--border)",borderRadius:8,padding:"10px 12px"}}>
                            <div style={{fontSize:10,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",marginBottom:4}}>{row.label}</div>

                              <span style={{fontSize:11,color:"var(--text2)"}}>Have: <b style={{color:ok?"var(--accent3)":"var(--accent2)"}}>{row.have} {row.unit}</b></span>

                            <div style={{height:6,background:"var(--panel2)",borderRadius:3,overflow:"hidden"}}>

                          <input type="number" value={altAmps} placeholder="e.g. 200" min={0} max={600}

                        </div>
                        <div style={{display:"flex",flexDirection:"column",gap:3}}>
                          <span style={{fontSize:10,color:"var(--muted)"}}>DC-DC charger output (A)</span>
                          <input type="number" value={dcDcChgAmps} placeholder="e.g. 50" min={0} max={200}

                        </div>
                      </div>
                      {Number(altAmps) > 0 && (
                        <div style={{marginTop:6,fontSize:11,color:"var(--text2)",background:"var(--panel2)",borderRadius:6,padding:"6px 10px",lineHeight:1.5}}>

                            ? ("DC-DC charger: " + Number(dcDcChgAmps) + "A × " + loadSysV + "V = " + Math.round(altDcW) + "W to battery while driving")
                            : ("Direct alternator: ~" + Math.round(Number(altAmps)*0.7) + "A available after engine loads × " + loadSysV + "V = " + Math.round(altDcW) + "W")}
                          <br/>
                          <span style={{color:"var(--accent2)",fontSize:10}}>Tip: A DC-DC charger (Orion XS) prevents alternator overload and regulates charge profile.</span>
                        </div>
                      )}

                    <div>
                      <div style={{fontSize:10,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",marginBottom:6}}>Shore Power</div>

                          </span>
                        </div>
                      )}
                    </div>
                    <div>
                      <div style={{fontSize:10,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",marginBottom:6}}>Generator</div>

                      </div>
                    </div>
                  </div>
                </div>

                        {label:"Solar (MPPT)",  w:Math.round(mpptMaxW),  color:"var(--accent2)"},
                        {label:"Alternator/DC-DC",w:Math.round(altDcW),  color:"var(--accent)"},
                        {label:"Shore Power",   w:Math.round(shoreChargeW),color:"var(--accent3)"},
                        {label:"Generator",     w:Math.round(genChargeW), color:"var(--accent3)"},
                      ].map((row,i)=>(row.w > 0 &&
                        <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",background:"var(--panel2)",borderRadius:7}}>
                          <span style={{fontSize:12,color:"var(--text)"}}>{row.label}</span>
                          <span style={{fontSize:14,fontWeight:700,color:row.color,fontFamily:"'Roboto Mono',monospace"}}>{row.w}W</span>
                        </div>

                          <span style={{fontSize:13,fontWeight:700,color:"var(--text)"}}>Total Charge Capacity</span>
                          <span style={{fontSize:16,fontWeight:700,color:"var(--accent3)",fontFamily:"'Roboto Mono',monospace"}}>{Math.round(totalChargeW)}W</span>
                        </div>
                      </div>
                      {totalBattKwh > 0 && totalChargeW > 0 && (
                        <div style={{background:"rgba(33,150,243,0.07)",border:"1px solid rgba(33,150,243,0.2)",borderRadius:8,padding:"10px 12px",marginTop:4}}>
                          <div style={{fontSize:11,color:"var(--text2)",marginBottom:3}}>Full recharge time (from 20% SoC)</div>
                          <div style={{fontSize:24,fontWeight:700,color:"var(--accent)",fontFamily:"'Roboto Mono',monospace"}}>{rechargeHrs} hrs</div>
                          <div style={{fontSize:10,color:"var(--muted)",marginTop:3}}>{totalBattKwh.toFixed(1)} kWh bank × 80% usable ÷ {Math.round(totalChargeW)}W</div>
                        </div>
                      )}
                      {totalBattKwh === 0 && <div className="no-results">Add batteries in Builder to see recharge time</div>}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {loadsSubTab === "wiresize" && (
              <div style={{display:"grid",gridTemplateColumns:"minmax(0,1fr) minmax(0,1.8fr)",gap:12}}>

                  <div className="section-head"><h3>Wire Size Calculator</h3></div>
                  <div className="section-body" style={{padding:14,display:"flex",flexDirection:"column",gap:14}}>
                    <div style={{fontSize:11,color:"var(--muted)",lineHeight:1.5,background:"var(--panel2)",borderRadius:7,padding:"8px 10px"}}>
                      ABYC E-11 standard: max 3% voltage drop for DC branch circuits. Enter one-way wire run length.
                    </div>
                    {[
                      {label:"Circuit Amperage (A)",val:wsAmps,set:setWsAmps,min:1,max:500,step:5},

                    ].map((row,i)=>(
                      <div key={i}>
                        <div style={{fontSize:10,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",marginBottom:6}}>{row.label}: <span style={{color:"var(--accent)",fontFamily:"'Roboto Mono',monospace"}}>{row.val}</span></div>
                        <input type="range" value={row.val} min={row.min} max={row.max} step={row.step}
                          style={{width:"100%",accentColor:"var(--accent)"}}
                          onChange={e=>row.set(Number(e.target.value))}/>
                        <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"var(--muted)"}}><span>{row.min}</span><span>{row.max}</span></div>
                      </div>
                    ))}
                    <div>
                      <div style={{fontSize:10,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",marginBottom:6}}>System Voltage</div>
                      <div style={{display:"flex",gap:6}}>
                        {[12,24,48].map(v=>(
                          <button key={v} className={"bf-chip"+(wsSysV===v?" on":"")} onClick={()=>setWsSysV(v)}>{v}V</button>

                        <div style={{fontSize:11,color:"var(--text2)",marginTop:6,lineHeight:1.5}}>
                          Max ampacity: {wsResult.maxA_cab}A (marine, outside engine space)<br/>
                          Voltage drop: {(((10.75 * wsAmps * wsLen * 2) / wsResult.cmil)).toFixed(3)}V ({(((10.75 * wsAmps * wsLen * 2) / wsResult.cmil) / wsSysV * 100).toFixed(2)}% of {wsSysV}V)
                        </div>
                      </div>
                    )}
                  </div>
                </div>

                <div className="builder-section">
                  <div className="section-head"><h3>AWG Ampacity Reference (ABYC Marine, Outside Engine Space)</h3></div>

                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                      <thead>
                        <tr style={{background:"var(--panel2)",borderBottom:"1px solid var(--border)"}}>
                          {["AWG","Max Amps","Circular Mils","Max ft @ 50A, 12V","Max ft @ 100A, 12V","Max ft @ 200A, 12V"].map((h,i)=>(
                            <th key={i} style={{padding:"8px 10px",textAlign:i===0?"left":"right",color:"var(--muted)",fontWeight:700,fontSize:10,textTransform:"uppercase",letterSpacing:".04em"}}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {AWG_TABLE.map((row,i)=>{
                          const isRec = wsResult && wsResult.awg === row.awg;
                          const maxFt = (amps) => {
                            const vd = wsSysV * 0.03;
                            return Math.floor((row.cmil * vd) / (10.75 * amps * 2));
                          };
                          return (
                            <tr key={i} style={{borderBottom:"1px solid var(--border)",
                              background:isRec?"rgba(33,150,243,0.1)":"transparent"}}>
                              <td style={{padding:"7px 10px",fontWeight:700,color:isRec?"var(--accent)":"var(--text)",fontFamily:"'Roboto Mono',monospace"}}>{row.awg}{isRec?" ◀":""}</td>
                              <td style={{padding:"7px 10px",textAlign:"right",color:"var(--accent3)",fontFamily:"'Roboto Mono',monospace"}}>{row.maxA_cab}A</td>
                              <td style={{padding:"7px 10px",textAlign:"right",color:"var(--text2)",fontFamily:"'Roboto Mono',monospace"}}>{row.cmil.toLocaleString()}</td>
                              <td style={{padding:"7px 10px",textAlign:"right",color:"var(--text2)",fontFamily:"'Roboto Mono',monospace"}}>{maxFt(50)}ft</td>
                              <td style={{padding:"7px 10px",textAlign:"right",color:"var(--text2)",fontFamily:"'Roboto Mono',monospace"}}>{row.maxA_cab>=100?maxFt(100)+"ft":"—"}</td>
                              <td style={{padding:"7px 10px",textAlign:"right",color:"var(--text2)",fontFamily:"'Roboto Mono',monospace"}}>{row.maxA_cab>=200?maxFt(200)+"ft":"—"}</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                    <div style={{padding:"8px 12px",fontSize:10,color:"var(--muted)",borderTop:"1px solid var(--border)"}}>
                      ABYC E-11 Table II · Values outside engine space · 60°C conductor temp · Maximum 3% voltage drop (2-way circuit)
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
  );

  const render_commission = () => tab !== "commission" ? null : (
          <div>
            <div className="page-header">
              <h1>Commissioning Checklist</h1>
              <p>Generated from selected equipment. Print with the quote and hand to the install tech.</p>
            </div>
            {commChecklist.length === 0 ? (
              <div className="builder-section" style={{padding:24,textAlign:"center"}}>
                <div style={{fontSize:14,color:"var(--muted)"}}>Add equipment in the Builder tab to generate your commissioning checklist.</div>
                <button className="btn btn-primary" style={{marginTop:12}} onClick={()=>setTab("builder")}>Go to Builder</button>
              </div>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                {commChecklist.map((section,si)=>(
                  <div key={si} className="builder-section">
                    <div className="section-head" style={{background:"var(--panel2)"}}>
                      <h3 style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{background:"var(--accent)",color:"#fff",borderRadius:5,padding:"2px 7px",fontSize:10,fontWeight:800}}>{si+1}</span>
                        {section.section}
                      </h3>
                      <span style={{fontSize:10,color:"var(--muted)",fontFamily:"'Roboto Mono',monospace"}}>{section.items.length} items</span>
                    </div>
                    <div className="section-body" style={{padding:"8px 14px"}}>
                      {section.items.map((item,ii)=>(
                        <div key={ii} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"7px 0",
                          borderBottom:ii<section.items.length-1?"1px solid var(--border)":"none"}}>
                          <div style={{width:18,height:18,border:"2px solid "+(item.critical?"var(--accent2)":"var(--border)"),

                          <span style={{fontSize:12,color:"var(--text)",lineHeight:1.45,flex:1}}>{item.text}</span>
                          {item.critical && (
                            <span style={{fontSize:9,fontWeight:800,color:"var(--accent2)",background:"rgba(245,124,0,0.12)",
                              borderRadius:4,padding:"2px 5px",flexShrink:0,letterSpacing:".04em"}}>CRITICAL</span>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <button className="export-btn pdf" onClick={()=>window.print()}>Print Checklist</button>
                </div>
              </div>
            )}
          </div>
  );

  const render_diagram = () => tab !== "diagram" ? null : (
          <div>
            <div className="page-header">
              <h1>System Wire Diagram</h1>
              <p>Auto-generated Lynx chain schematic based on your build. Export as SVG or print.</p>
            </div>
            {totalBattQ + totalInvQ + totalMpptQ === 0 ? (
              <div className="builder-section" style={{padding:24,textAlign:"center"}}>
                <div style={{fontSize:14,color:"var(--muted)"}}>Add equipment in Builder to generate your system diagram.</div>
                <button className="btn btn-primary" style={{marginTop:12}} onClick={()=>setTab("builder")}>Go to Builder</button>

              <div className="builder-section" style={{padding:0,overflow:"auto"}}>
                <svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg"

                  <rect width="900" height="520" fill="var(--panel)" rx="12"/>

                  <text x="450" y="28" textAnchor="middle" fill="var(--text)" fontSize="13" fontWeight="700">
                    {(coachInfo.year||"")+" "+(coachInfo.make||"")+" "+(coachInfo.model||"System")} — DC System Architecture
                  </text>

                  <g transform="translate(30,60)">
                    <rect width="140" height={Math.max(80, totalBattQ*28+24)} rx="8" fill="var(--panel2)" stroke="var(--accent3)" strokeWidth="1.5"/>
                    <text x="70" y="18" textAnchor="middle" fill="var(--accent3)" fontSize="9" fontWeight="700">BATTERY BANK</text>
                    {Array.from({length:Math.min(totalBattQ,8)},(_,i)=>(
                      <g key={i} transform={"translate(10,"+(24+i*26)+")"}>
                        <rect width="120" height="20" rx="4" fill="var(--panel)" stroke="var(--accent3)" strokeWidth="1"/>
                        <text x="60" y="14" textAnchor="middle" fill="var(--accent3)" fontSize="9">
                          {Object.keys(batteryQtys).find(id=>batteryQtys[id]>0) ?
                            PRODUCTS.batteries.find(x=>x.id===Object.keys(batteryQtys).find(id=>batteryQtys[id]>0))?.voltage+"V LiFePO4"
                            : "12V Battery"} {i+1}
                        </text>
                      </g>
                    ))}
                    {totalBattQ > 8 && <text x="70" y={24+8*26+14} textAnchor="middle" fill="var(--muted)" fontSize="8">+{totalBattQ-8} more</text>}
                  </g>

                  <line x1="170" y1="110" x2="220" y2="110" stroke="var(--accent2)" strokeWidth="2.5" markerEnd="url(#arrow)"/>
                  <text x="195" y="104" textAnchor="middle" fill="var(--accent2)" fontSize="8">DC+</text>

                  {(accessoryQtys['lynx_power_in']||0) > 0 && (
                    <g transform="translate(220,80)">
                      <rect width="90" height="60" rx="8" fill="var(--panel2)" stroke="var(--accent)" strokeWidth="1.5"/>
                      <text x="45" y="18" textAnchor="middle" fill="var(--accent)" fontSize="8" fontWeight="700">LYNX POWER IN</text>
                      <text x="45" y="32" textAnchor="middle" fill="var(--muted)" fontSize="7">{accessoryQtys['lynx_power_in']}x unit</text>
                      <text x="45" y="50" textAnchor="middle" fill="var(--text2)" fontSize="7">{totalBattQ} cable ports</text>
                    </g>
                  )}

                  <line x1="310" y1="110" x2="360" y2="110" stroke="var(--accent2)" strokeWidth="2.5" markerEnd="url(#arrow)"/>

                  {(accessoryQtys['lynx_shunt']||0) > 0 && (
                    <g transform="translate(360,80)">
                      <rect width="90" height="60" rx="8" fill="var(--panel2)" stroke="var(--accent)" strokeWidth="1.5"/>
                      <text x="45" y="18" textAnchor="middle" fill="var(--accent)" fontSize="8" fontWeight="700">LYNX SHUNT</text>
                      <text x="45" y="32" textAnchor="middle" fill="var(--muted)" fontSize="7">VE.Can</text>
                      <text x="45" y="48" textAnchor="middle" fill="var(--text2)" fontSize="7">1000A rated</text>
                    </g>
                  )}

                  <line x1="450" y1="110" x2="500" y2="110" stroke="var(--accent2)" strokeWidth="2.5" markerEnd="url(#arrow)"/>

                  <g transform="translate(500,65)">
                    <rect width="100" height="90" rx="8" fill="var(--panel2)" stroke="var(--accent)" strokeWidth="1.5"/>
                    <text x="50" y="16" textAnchor="middle" fill="var(--accent)" fontSize="8" fontWeight="700">LYNX DIST.</text>
                    <text x="50" y="28" textAnchor="middle" fill="var(--muted)" fontSize="7">{(accessoryQtys['lynx_distributor']||1)}x · 4 slots ea</text>
                    {[0,1,2,3].map(slot=>(
                      <g key={slot} transform={"translate(8,"+(36+slot*13)+")"}>
                        <rect width="84" height="11" rx="3" fill={slot<(totalInvQ*2+totalMpptQ)?"rgba(33,150,243,0.15)":"var(--panel)"} stroke="var(--border)" strokeWidth="0.5"/>
                        <text x="42" y="9" textAnchor="middle" fill={slot<(totalInvQ*2+totalMpptQ)?"var(--accent)":"var(--muted)"} fontSize="7">
                          {slot < totalInvQ*2 ? "INV slot "+(slot+1) : slot < totalInvQ*2+totalMpptQ ? "MPPT slot "+(slot-totalInvQ*2+1) : "— open —"}
                        </text>
                      </g>
                    ))}
                  </g>

                  <line x1="600" y1="100" x2="660" y2="100" stroke="var(--accent2)" strokeWidth="2.5" markerEnd="url(#arrow)"/>
                  <line x1="600" y1="120" x2="660" y2="120" stroke="var(--accent2)" strokeWidth="1.5" strokeDasharray="4,3" markerEnd="url(#arrow)"/>
                  <text x="630" y="94" textAnchor="middle" fill="var(--accent2)" fontSize="7">2x cables</text>

                  {Object.entries(inverterQtys).filter(([,q])=>q>0).slice(0,2).map(([id,q],i)=>{
                    const inv = PRODUCTS.inverters.find(x=>x.id===id);
                    if (!inv) return null;
                    return (
                      <g key={id} transform={"translate(660,"+(60+i*80)+")"}>
                        <rect width="120" height="60" rx="8" fill="var(--panel2)" stroke="var(--accent2)" strokeWidth="1.5"/>
                        <text x="60" y="16" textAnchor="middle" fill="var(--accent2)" fontSize="8" fontWeight="700">INVERTER/CHARGER</text>
                        <text x="60" y="28" textAnchor="middle" fill="var(--text)" fontSize="7">{inv.model}</text>
                        <text x="60" y="40" textAnchor="middle" fill="var(--muted)" fontSize="7">{inv.voltage}V DC · {inv.va}VA</text>
                        <text x="60" y="52" textAnchor="middle" fill="var(--accent3)" fontSize="7">→ 120V AC Output</text>
                      </g>
                    );
                  })}

                  {Object.entries(mpptQtys).filter(([,q])=>q>0).slice(0,2).map(([id,q],i)=>{
                    const m = PRODUCTS.mppTs.find(x=>x.id===id);
                    if (!m) return null;
                    return (
                      <g key={id}>
                        <line x1={"550"} y1={"155"} x2={"550"} y2={"220"} stroke="var(--accent2)" strokeWidth="1.5" markerEnd="url(#arrow)"/>
                        <g transform={"translate("+(480+i*140)+",220)"}>
                          <rect width="110" height="55" rx="8" fill="var(--panel2)" stroke="var(--warn)" strokeWidth="1.5"/>
                          <text x="55" y="16" textAnchor="middle" fill="var(--warn)" fontSize="8" fontWeight="700">MPPT {i+1}</text>
                          <text x="55" y="28" textAnchor="middle" fill="var(--text)" fontSize="7">{m.model}</text>
                          <text x="55" y="40" textAnchor="middle" fill="var(--muted)" fontSize="7">{m.maxPV}V PV · {m.maxA}A out</text>
                          <text x="55" y="52" textAnchor="middle" fill="var(--accent2)" fontSize="7">← Solar Panels</text>
                        </g>
                      </g>
                    );
                  })}

                  <line x1="100" y1="200" x2="100" y2="290" stroke="var(--border)" strokeWidth="2"/>
                  <line x1="100" y1="290" x2="800" y2="290" stroke="var(--border)" strokeWidth="2"/>
                  <text x="450" y="308" textAnchor="middle" fill="var(--muted)" fontSize="9" fontWeight="700">DC NEGATIVE BUS (Star Point)</text>
                  <line x1="720" y1="200" x2="720" y2="290" stroke="var(--border)" strokeWidth="1.5" strokeDasharray="4,3"/>
                  <line x1="550" y1="200" x2="550" y2="290" stroke="var(--border)" strokeWidth="1.5" strokeDasharray="4,3"/>

                  {(accessoryQtys['cerbo_gx']||0) > 0 && (
                    <g>
                      <line x1="450" y1="65" x2="450" y2="360" stroke="var(--accent)" strokeWidth="1" strokeDasharray="5,3"/>
                      <g transform="translate(380,360)">
                        <rect width="140" height="50" rx="8" fill="var(--panel2)" stroke="var(--accent)" strokeWidth="1.5"/>
                        <text x="70" y="18" textAnchor="middle" fill="var(--accent)" fontSize="9" fontWeight="700">CERBO GX</text>
                        <text x="70" y="30" textAnchor="middle" fill="var(--muted)" fontSize="7">VE.Can + VE.Direct bus</text>
                        <text x="70" y="44" textAnchor="middle" fill="var(--text2)" fontSize="7">→ VRM Cloud Monitoring</text>
                      </g>
                    </g>
                  )}

                  <g transform="translate(30,440)">
                    <text x="0" y="12" fill="var(--muted)" fontSize="8" fontWeight="700">LEGEND:</text>
                    <line x1="60" y1="8" x2="90" y2="8" stroke="var(--accent2)" strokeWidth="2.5"/>
                    <text x="95" y="12" fill="var(--muted)" fontSize="8">DC positive cable</text>
                    <line x1="180" y1="8" x2="210" y2="8" stroke="var(--border)" strokeWidth="2"/>
                    <text x="215" y="12" fill="var(--muted)" fontSize="8">DC negative/ground</text>
                    <line x1="320" y1="8" x2="350" y2="8" stroke="var(--accent)" strokeWidth="1" strokeDasharray="5,3"/>
                    <text x="355" y="12" fill="var(--muted)" fontSize="8">VE.Can / data bus</text>
                    <line x1="460" y1="8" x2="490" y2="8" stroke="var(--accent2)" strokeWidth="1.5" strokeDasharray="4,3"/>
                    <text x="495" y="12" fill="var(--muted)" fontSize="8">Parallel cable (2nd)</text>
                  </g>

                  <defs>
                    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                      <path d="M0,0 L0,6 L6,3 z" fill="var(--accent2)"/>
                    </marker>
                  </defs>
                </svg>
                <div style={{padding:"8px 14px",display:"flex",gap:8}}>
                  <button className="export-btn pdf" onClick={()=>window.print()}>Print / Save as PDF</button>
                </div>
              </div>
            )}
          </div>
  );

  const render_projects = () => tab !== "projects" ? null : (
          <div>
            <div className="page-header">
              <h1>Projects</h1>
              <p>Save named quotes and switch between active builds. All data stored locally in your browser.</p>
            </div>

                <div className="section-body" style={{padding:14,display:"flex",flexDirection:"column",gap:10}}>

                      onChange={e=>setProjectName(e.target.value)}/>

                          <div style={{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:2}}>{p.name}</div>
                          <div style={{fontSize:10,color:"var(--muted)"}}>{p.date} · {p.coachInfo?.year} {p.coachInfo?.make} {p.coachInfo?.model}</div>
                          <div style={{fontSize:11,color:"var(--accent3)",fontFamily:"'Roboto Mono',monospace",marginTop:3}}>${(p.grandTotal||0).toLocaleString()}</div>
                        </div>
                        <div style={{display:"flex",flexDirection:"column",gap:4}}>
                          <button className="bf-chip on" style={{padding:"4px 10px",fontSize:11}} onClick={()=>loadProject(p)}>Load</button>
                          <button className="bf-chip" style={{padding:"4px 10px",fontSize:11,color:"var(--danger)",borderColor:"var(--danger)"}}
                            onClick={()=>deleteProject(p.id)}>Delete</button>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <div style={{marginTop:12,display:"grid",gridTemplateColumns:"minmax(0,1fr) minmax(0,1fr)",gap:12}}>
              <div className="builder-section">
                <div className="section-head"><h3>Site Photos</h3></div>
                <div className="section-body" style={{padding:14}}>
                  <div style={{marginBottom:10}}>
                    <input type="file" accept="image/*" multiple
                      style={{display:"none"}} id="photo-upload"
                      onChange={e=>{
                        Array.from(e.target.files||[]).forEach(file=>{
                          const reader = new FileReader();
                          reader.onload = ev => setSitePhotos(prev=>[...prev,{id:Date.now()+Math.random(),name:file.name,dataUrl:ev.target.result,note:""}]);
                          reader.readAsDataURL(file);
                        });
                        e.target.value='';
                      }}/>
                    <label htmlFor="photo-upload" className="btn btn-primary" style={{cursor:"pointer",display:"inline-flex",alignItems:"center",gap:6,padding:"8px 16px",borderRadius:8,fontSize:13}}>

                    <span style={{fontSize:11,color:"var(--muted)",marginLeft:10}}>{sitePhotos.length} photos attached</span>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:8}}>
                    {sitePhotos.map(ph=>(
                      <div key={ph.id} style={{position:"relative",borderRadius:8,overflow:"hidden",border:"1px solid var(--border)"}}>
                        <img src={ph.dataUrl} alt={ph.name} style={{width:"100%",height:90,objectFit:"cover",display:"block"}}/>
                        <div style={{padding:"4px 6px",background:"var(--panel2)"}}>
                          <input type="text" value={ph.note} placeholder="Note..."
                            style={{width:"100%",background:"transparent",border:"none",outline:"none",fontSize:10,color:"var(--text)"}}
                            onChange={e=>setSitePhotos(prev=>prev.map(x=>x.id===ph.id?{...x,note:e.target.value}:x))}/>
                        </div>
                        <button onClick={()=>setSitePhotos(prev=>prev.filter(x=>x.id!==ph.id))}
                          style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,0.6)",border:"none",color:"#fff",borderRadius:4,width:20,height:20,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
              <div className="builder-section">
                <div className="section-head"><h3>Site Notes</h3></div>
                <div className="section-body" style={{padding:10}}>
                  <textarea value={siteNotes} placeholder="Bay dimensions, existing wiring notes, cable routing path, customer requests, install notes..."
                    style={{width:"100%",minHeight:180,background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,padding:"10px 12px",color:"var(--text)",fontSize:13,lineHeight:1.5,resize:"vertical",fontFamily:"'Source Sans 3',sans-serif"}}
                    onChange={e=>setSiteNotes(e.target.value)}/>
                  <div style={{fontSize:10,color:"var(--muted)",marginTop:6}}>{siteNotes.length} characters · Saved automatically with project</div>
                </div>
              </div>
            </div>
          </div>
  );

                      {Object.entries(panelQtys).filter(([,q])=>q>0).map(([id,q])=>{const x=PRODUCTS.panels.find(m=>m.id===id);return x?<tr key={id}>

                        <td className="mono" style={{textAlign:"center"}}>{q}</td>
                        <td className="val-blue" style={{textAlign:"right"}}>${x.price.toLocaleString()}</td>
                        <td className="val-green" style={{textAlign:"right",fontWeight:700}}>${(x.price*q).toLocaleString()}</td>
                        <td className="mono" style={{textAlign:"right"}}>{(x.labor*q).toFixed(1)}h</td>

                      {Object.entries(accessoryQtys).filter(([,q])=>q>0).map(([id,q])=>{const x=PRODUCTS.accessories.find(m=>m.id===id);return x?<tr key={id}>

                      {Object.entries(bosQtys).filter(([,q])=>q>0).map(([id,q])=>{const x=PRODUCTS.bos.find(m=>m.id===id);return x?<tr key={id}><td style={{color:"var(--text)",fontWeight:600}}>{x.name}<br/><span style={{fontSize:11,color:"var(--muted)",fontWeight:400}}>{x.cat} · {x.desc}</span></td><td className="mono" style={{textAlign:"center"}}>{q}</td><td className="val-blue" style={{textAlign:"right"}}>${x.price.toFixed(2)}/{x.unit}</td><td className="val-green" style={{textAlign:"right",fontWeight:700}}>${(x.price*q).toFixed(0)}</td><td className="mono" style={{textAlign:"right"}}>{(x.labor*q).toFixed(1)}h</td></tr>:null;})}

                      <tr style={{background:"var(--panel2)"}}>

                      </tr>
                      <tr style={{background:"var(--panel2)"}}>
                        <td colSpan={3} style={{fontWeight:700,color:"var(--text)",fontSize:13}}>Install Labor ({laborTotal.toFixed(1)} hrs x $${laborRate}/hr)</td>
                        <td className="val-green" style={{textAlign:"right",fontWeight:700,fontSize:14}}>${laborCost.toLocaleString()}</td>
                        <td></td>
                      </tr>
                      {configTotal > 0 && (() => {
                        const cfgItems = [];
                        Object.entries(inverterQtys).forEach(([id,q])=>{ const x=PRODUCTS.inverters.find(m=>m.id===id); if(x&&x.config&&q>0) cfgItems.push({name:x.model,q,hrs:x.config,note:x.configNote||""}); });
                        Object.entries(mpptQtys).forEach(([id,q])=>{ const x=PRODUCTS.mppTs.find(m=>m.id===id); if(x&&x.config&&q>0) cfgItems.push({name:x.model,q,hrs:x.config,note:x.configNote||""}); });
                        Object.entries(batteryQtys).forEach(([id,q])=>{ const x=PRODUCTS.batteries.find(m=>m.id===id); if(x&&x.config&&q>0) cfgItems.push({name:(x.brand+" "+x.series+" "+x.voltage+"V"),q,hrs:x.config,note:x.configNote||""}); });
                        Object.entries(accessoryQtys).forEach(([id,q])=>{ const x=PRODUCTS.accessories.find(m=>m.id===id); if(x&&x.config&&q>0) cfgItems.push({name:x.name,q,hrs:x.config,note:x.configNote||""}); });

                          <tr style={{background:"var(--panel2)"}}>
                            <td colSpan={3} style={{fontWeight:700,color:"var(--accent)",fontSize:13}}>
                              Configuration &amp; Programming ({configTotal.toFixed(1)}h @ $${laborRate}/hr)

                            <td></td>
                          </tr>

                              </td>
                              <td style={{textAlign:"center",fontSize:11,color:"var(--muted)"}}>x{ci.q}</td>
                              <td style={{textAlign:"center",fontSize:11,color:"var(--muted)"}}>{(ci.hrs*ci.q).toFixed(1)}h</td>
                              <td style={{textAlign:"right",fontSize:11,color:"var(--text2)"}}>${Math.round(ci.hrs*ci.q*laborRate).toLocaleString()}</td>
                              <td></td>
                            </tr>
                          ))}

                      })()}
                      <tr style={{background:"rgba(76,175,80,0.08)",borderTop:"2px solid var(--accent3)"}}>
                        <td colSpan={3} style={{fontWeight:800,color:"var(--text)",fontSize:15}}>Grand Total</td>
                        <td style={{textAlign:"right",fontWeight:800,fontSize:18,color:"var(--accent3)",fontFamily:"'Roboto Mono',monospace"}}>${grandTotal.toLocaleString()}</td>
                        <td></td>
                      </tr>
                    </tbody>
                  </table></div>
              }
              {grandTotal > 0 && <div className="section-body" style={{paddingTop:0}}>
                {[
                  ...Object.entries(inverterQtys).filter(([,q])=>q>0).map(([id,q])=>{const x=PRODUCTS.inverters.find(m=>m.id===id);return x?{name:`${x.brand} ${x.model}`,sub:`${x.voltage}V ${x.va}VA`,qty:q,unit:x.price,amt:x.price*q,labor:x.labor*q}:null;}).filter(Boolean),
                  ...Object.entries(mpptQtys).filter(([,q])=>q>0).map(([id,q])=>{const x=PRODUCTS.mppTs.find(m=>m.id===id);return x?{name:x.model,sub:`${x.maxA}A MPPT`,qty:q,unit:x.price,amt:x.price*q,labor:x.labor*q}:null;}).filter(Boolean),
                  ...Object.entries(batteryQtys).filter(([,q])=>q>0).map(([id,q])=>{const x=PRODUCTS.batteries.find(m=>m.id===id);return x?{name:`${x.brand} ${x.series}`,sub:`${x.voltage}V ${x.ah}Ah`,qty:q,unit:x.price,amt:x.price*q,labor:x.labor*q}:null;}).filter(Boolean),
                  ...Object.entries(panelQtys).filter(([,q])=>q>0).map(([id,q])=>{const x=PRODUCTS.panels.find(m=>m.id===id);return x?{name:`${x.brand} ${x.model}`,sub:`${x.w}W panel`,qty:q,unit:x.price,amt:x.price*q,labor:x.labor*q}:null;}).filter(Boolean),
                  ...Object.entries(accessoryQtys).filter(([,q])=>q>0).map(([id,q])=>{const x=PRODUCTS.accessories.find(m=>m.id===id);return x?{name:x.name,sub:x.family,qty:q,unit:x.price,amt:x.price*q,labor:x.labor*q}:null;}).filter(Boolean),
                  ...Object.entries(bosQtys).filter(([,q])=>q>0).map(([id,q])=>{const x=PRODUCTS.bos.find(m=>m.id===id);return x?{name:x.name,sub:x.cat,qty:q,unit:x.price,amt:x.price*q,labor:x.labor*q}:null;}).filter(Boolean),
                  ...wireRuns.map((r,i)=>{const c=CABLE_PRICING.find(x=>x.awg===r.awg);if(!c)return null;const cost=c.priceFt*r.strands*r.feet;const lh=(r.strands*r.feet)/100;return{name:r.label||`Wire Run ${i+1}`,sub:`${r.strands}x ${r.awg} · ${r.feet}ft`,qty:r.strands,unit:c.priceFt,amt:cost,labor:lh};}).filter(Boolean),
                ].map((item,i) => (
                  <div key={i} className="vtable-card-row">
                    <div className="vtc-name">{item.name}</div>

                  <div>

            <div className="builder-section">

                <p>• `Labor rate: $${laborRate}/hr`</p>
                <p>• Solar recharge estimates assume 5 peak sun hours/day at 80% efficiency</p>
                <p>• Battery runtime assumes moderate mixed loads; verify with Load Calculator</p>
                <p>• Wire/cable estimate not included — add from Catalog as needed</p>
                <p>• Pricing is placeholder retail; verify current distributor pricing before finalizing quote</p>
                <p>• Confirm voltage classes match across all selected components before install</p>
                {mpptWarning && <p style={{color:"var(--warn)"}}>! Warning: MPPT capacity insufficient for selected solar array size.</p>}

  return (
    <div className="app">
      <div className="topbar">
        <div className="topbar-left">
          <div className="logo-mark">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          </div>
          <div className="logo" style={{fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"-0.5px"}}>Patriots RV <span style={{color:"#42a5f5"}}>Solar</span></div>
          <div className="nav-tabs">
            {[["intake","New Build"],["builder","Builder"],["loads","Loads"],["commission","Checklist"],["diagram","Diagram"],["projects","Projects"],["catalog","Catalog"],["roof","Roof"],["quote","Quote"]].map(([id,label]) => (
              <button key={id} className={"nav-tab"+(tab===id?" active":"")} onClick={() => setTab(id)}>{label}</button>
            ))}
          </div>
        </div>

            Undo{history.length > 0 ? " ("+history.length+")" : ""}
          </button>
          <div className="tt-divider"/>
          <button className="tt-btn" onClick={()=>setShowClearModal(true)} title="Clear all build data and start over"
            style={{color:"var(--accent2)",fontWeight:600}}>
            &#x2715; New Build
          </button>
          <div className="tt-divider"/>
          <button className="tt-btn" onClick={() => setShowPricingModal(true)} title="Configure labor rate and pricing">
            &#x2699; Pricing
          </button>
          <div className="tt-divider"/>
          <button className={"tt-btn"+(theme==="dark"?" active":"")} onClick={() => setTheme("dark")}>Dark</button>
          <button className={"tt-btn"+(theme==="light"?" active":"")} onClick={() => setTheme("light")}>Light</button>
        </div>
      </div>

      <div className="bottom-nav">
        {[["intake","⚡","Build"],["builder","","Builder"],["loads","⚖","Loads"],["quote","","Quote"],["commission","✓","Check"]].map(([id,icon,label]) => (
          <button key={id} className={"bn-item"+(tab===id?" active":"")} onClick={() => setTab(id)}>
            <span className="bn-icon">{icon}</span>
            <span className="bn-label">{label}</span>
          </button>
        ))}
      </div>

      <div className="main">
        {render_intake()}
        {render_builder()}
        {render_loads()}
        {render_commission()}
        {render_diagram()}
        {render_projects()}
        {render_catalog()}
        {render_roof()}
        {render_quote()}
      </div>
      {showPricingModal && (
        <div onClick={()=>setShowPricingModal(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:900,display:"flex",alignItems:"center",justifyContent:"center"}}>

            <div style={{fontSize:18,fontWeight:800,color:"var(--accent)",marginBottom:6}}>&#x2699; Pricing Settings</div>
            <p style={{fontSize:12,color:"var(--muted)",marginBottom:20,lineHeight:1.5}}>
              Configure your shop's labor rate. Product price overrides (wholesale/retail) coming soon.
            </p>

              <label style={{display:"block",fontSize:11,fontWeight:700,color:"var(--text2)",marginBottom:8,letterSpacing:".06em",textTransform:"uppercase"}}>Labor & Config Rate ($/hr)</label>

                <span style={{fontSize:18,color:"var(--muted)",fontWeight:600}}>$</span>

                Save Rate

            </div>
          </div>
        </div>

                style={{flex:1,padding:"11px 0",borderRadius:9,border:"1px solid var(--border)",background:"var(--panel2)",color:"var(--text)",fontSize:13,fontWeight:600,cursor:"pointer"}}>

                Clear &amp; Start Over

          </div>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <span style={{fontSize:16,fontWeight:700,color:"var(--text)"}}>&#x1F4F1; Send Quote via SMS</span>

            <div style={{marginBottom:16}}>
              <label style={{display:"block",fontSize:11,fontWeight:600,color:"var(--text2)",marginBottom:6,letterSpacing:".05em",textTransform:"uppercase"}}>Phone Number</label>

                onChange={e=>setSmsPhone(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&handleSendSms()}
                autoFocus
                style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid var(--border)",background:"var(--panel2)",color:"var(--text)",fontSize:15,fontFamily:"'Roboto Mono',monospace",outline:"none",boxSizing:"border-box"}}
              />
            </div>
            <div style={{background:"var(--panel2)",borderRadius:8,padding:"10px 12px",marginBottom:18,maxHeight:140,overflowY:"auto"}}>
              <div style={{fontSize:10,color:"var(--muted)",marginBottom:6,fontWeight:600,letterSpacing:".05em",textTransform:"uppercase"}}>Message Preview</div>
              <pre style={{fontSize:10,color:"var(--text2)",fontFamily:"'Roboto Mono',monospace",margin:0,whiteSpace:"pre-wrap",lineHeight:1.5}}>{buildSmsBody()}</pre>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{navigator.clipboard.writeText(buildSmsBody());showToast("Quote copied to clipboard","ok");}} style={{flex:1,padding:"10px 0",borderRadius:9,border:"1px solid var(--border)",background:"transparent",color:"var(--text2)",cursor:"pointer",fontSize:13}}>
                Copy Text
              </button>
              <button onClick={handleSendSms} style={{flex:2,padding:"10px 0",borderRadius:9,border:"none",background:"var(--accent)",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700}}>
                Open SMS App &#x2192;
              </button>
            </div>
          </div>
        </div>
      )}
      {toast && (
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:toast.type==="ok"?"var(--accent3)":toast.type==="warn"?"var(--accent2)":"var(--accent)",color:"#fff",padding:"10px 22px",borderRadius:10,fontSize:13,fontWeight:600,zIndex:9999,boxShadow:"0 4px 20px rgba(0,0,0,0.4)",pointerEvents:"none",whiteSpace:"nowrap"}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}


    function Root() {
        const [user, setUser] = React.useState(null);
        if (!user) return <LoginGate onAuth={setUser} />;
        return <App />;
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Root />);
    document.getElementById('loading').style.display = 'none';
  </script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <div style="text-align: center; padding: 12px; font-size: 11px; color: rgba(100,116,139,0.4); font-family: monospace;">v1.0</div>
</body>
