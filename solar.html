const buildCss = (t) => {
  const v = Object.entries(t).map(([k,val]) => `${k}:${val}`).join(";");
  return `
  @import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap');
  :root{${v}}
  html{-webkit-text-size-adjust:100%;scroll-behavior:smooth;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'Source Sans 3',sans-serif;font-size:16px;line-height:1.4;}

  .app{min-height:100vh;display:flex;flex-direction:column;padding-bottom:68px;}
  @media(min-width:680px){.app{padding-bottom:0;}}

  /* ─ TOPBAR ─ */
  .topbar{background:var(--topbar-bg);border-bottom:1px solid var(--topbar-bd);padding:0 14px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
  .topbar-left{display:flex;align-items:center;overflow:hidden;flex:1;min-width:0;}
  .topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .logo-mark{width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent-h));display:flex;align-items:center;justify-content:center;margin-right:8px;flex-shrink:0;}
  .logo-mark svg{width:17px;height:17px;}
  .logo{font-size:15px;font-weight:700;color:var(--logo-c);white-space:nowrap;}
  .logo span{color:var(--logo-c2);font-weight:400;}
  .nav-tabs{display:none;}
  @media(min-width:680px){
    .nav-tabs{display:flex;margin-left:16px;}
    .nav-tab{padding:0 13px;height:52px;border:none;border-bottom:3px solid transparent;cursor:pointer;font-size:12px;font-family:'Source Sans 3',sans-serif;font-weight:600;background:transparent;color:rgba(255,255,255,0.55);transition:all 0.18s;display:flex;align-items:center;white-space:nowrap;}
    .nav-tab:hover{color:rgba(255,255,255,0.9);background:rgba(255,255,255,0.06);}
    .nav-tab.active{color:#fff;border-bottom-color:var(--accent-h);background:rgba(255,255,255,0.08);}
  }
  .theme-toggle{display:flex;align-items:center;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:6px;overflow:hidden;}
  .tt-btn{padding:5px 8px;border:none;cursor:pointer;font-size:11px;font-family:'Source Sans 3',sans-serif;font-weight:600;background:transparent;color:rgba(255,255,255,0.6);transition:all 0.18s;display:flex;align-items:center;gap:4px;}
  .tt-btn.active{background:rgba(255,255,255,0.2);color:#fff;}
  .tt-divider{width:1px;height:20px;background:rgba(255,255,255,0.2);}

  /* ─ BOTTOM NAV (mobile only) ─ */
  .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--topbar-bg);border-top:2px solid var(--topbar-bd);height:68px;align-items:stretch;padding-bottom:env(safe-area-inset-bottom,0px);}
  .bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;cursor:pointer;padding:6px 2px 4px;color:rgba(255,255,255,0.4);transition:all 0.15s;}
  .bn-item.active{color:var(--accent-h);}
  .bn-item:active{background:rgba(255,255,255,0.08);}
  .bn-icon{font-size:22px;line-height:1;}
  .bn-label{font-size:9px;font-weight:700;letter-spacing:0.2px;text-transform:uppercase;font-family:'Source Sans 3',sans-serif;}
  @media(min-width:680px){.bottom-nav{display:none;}}

  /* ─ MAIN ─ */
  .main{flex:1;padding:10px;max-width:1440px;margin:0 auto;width:100%;}
  @media(min-width:680px){.main{padding:24px 28px;}}

  /* Page header */
  .page-header{margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border);}
  .page-header h1{font-size:16px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;}
  .page-header h1 .ph-icon{width:32px;height:32px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .page-header p{color:var(--muted);margin-top:5px;font-size:13px;}

  /* Step dots */
  .step-indicator{display:flex;gap:6px;align-items:center;margin-bottom:16px;}
  .step-dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:all 0.3s;}
  .step-dot.active{background:var(--accent);box-shadow:0 0 0 3px rgba(33,150,243,0.25);}
  .step-dot.done{background:var(--accent3);}

  /* Section label */
  .section-label{font-family:'Roboto Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border);}

  /* Goal cards */
  .goal-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px;}
  @media(min-width:400px){.goal-grid{grid-template-columns:repeat(auto-fill,minmax(148px,1fr));}}
  .goal-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:13px;cursor:pointer;display:flex;flex-direction:column;gap:7px;box-shadow:var(--shadow);transition:all 0.15s;}
  .goal-card:active{transform:scale(0.97);}
  .goal-card.selected{border-color:var(--accent);background:var(--panel2);box-shadow:0 0 0 2px var(--accent);}
  .goal-icon{font-size:22px;}
  .goal-label{font-size:13px;font-weight:600;line-height:1.3;color:var(--text2);}
  .goal-card.selected .goal-label{color:var(--accent);}

  /* RV cards */
  .rv-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px;}
  @media(min-width:400px){.rv-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}}
  .rv-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;font-size:14px;font-weight:600;text-align:center;color:var(--text2);min-height:52px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
  .rv-card:active{transform:scale(0.97);}
  .rv-card.selected{border-color:var(--accent2);background:var(--panel2);color:var(--accent2);box-shadow:0 0 0 2px var(--accent2);}

  /* Forms */
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
  .field-group{display:flex;flex-direction:column;gap:5px;}
  .field-label{font-size:11px;color:var(--muted);font-family:'Roboto Mono',monospace;letter-spacing:1px;text-transform:uppercase;}
  .field-input{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-size:16px;font-family:'Source Sans 3',sans-serif;outline:none;-webkit-appearance:none;width:100%;}
  .field-input:focus{border-color:var(--accent);}

  /* Buttons */
  .btn{padding:13px 22px;border-radius:10px;border:none;cursor:pointer;font-family:'Source Sans 3',sans-serif;font-weight:700;font-size:15px;transition:all 0.18s;min-height:48px;}
  .btn:disabled{opacity:0.4;cursor:default;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:active:not(:disabled){opacity:0.85;}
  .btn-secondary{background:var(--panel);border:1px solid var(--border);color:var(--text2);}
  .btn-secondary:active{border-color:var(--accent);color:var(--accent);}
  .btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}

  /* ─ BUILDER ─ */
  .builder-layout{display:grid;grid-template-columns:1fr;gap:12px;align-items:start;overflow-x:hidden;}
  @media(min-width:960px){.builder-layout{grid-template-columns:1fr 310px;} .builder-col{max-height:calc(100vh - 120px);overflow-y:auto;overflow-x:hidden;padding-right:4px;} .builder-col::-webkit-scrollbar{width:4px;} .builder-col::-webkit-scrollbar-track{background:transparent;} .builder-col::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}}
  .builder-section{background:var(--panel);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow);}
  .section-head{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--panel2);}
  .collapse-btn{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;width:26px;height:26px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;padding:0;transition:transform .18s,border-color .18s;flex-shrink:0;}
  .collapse-btn:hover{border-color:var(--accent);color:var(--accent);}
  .collapse-btn.open{transform:rotate(0deg);}
  .collapse-btn.closed{transform:rotate(-90deg);}
  .section-collapsed .section-body,.section-collapsed .builder-filters{display:none;}
  .section-head h3{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;}
  .section-head-icon{width:20px;height:20px;border-radius:4px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
  .section-body{padding:7px 10px;}

  /* Product rows — mobile: name+qty on one line, detail+price on second */
  .product-row{display:grid;grid-template-columns:1fr auto;grid-template-rows:auto auto;gap:0 8px;padding:8px 10px;border:1px solid var(--border);border-radius:7px;margin-bottom:5px;background:var(--row-bg);transition:.15s;align-items:center;}
  .product-row:active{background:var(--panel2);}
  .product-row.selected{border-color:var(--accent);background:var(--panel2);box-shadow:inset 3px 0 0 var(--accent);}
  .product-info{grid-column:1;grid-row:1;min-width:0;}
  .product-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .product-detail{font-size:10px;color:var(--muted);margin-top:1px;font-family:'Roboto Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .product-price{grid-column:1;grid-row:2;font-family:'Roboto Mono',monospace;font-size:10px;color:var(--muted);font-weight:400;padding-top:2px;}
  .product-amount{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--accent3);font-weight:700;white-space:nowrap;grid-column:2;grid-row:2;text-align:right;padding-top:2px;}
  .product-amount.zero{color:var(--muted);font-weight:400;}
  .qty-control{grid-column:2;grid-row:1;display:flex;align-items:center;gap:3px;flex-shrink:0;}
  .qty-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--text2);cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;font-weight:300;transition:.12s;flex-shrink:0;}
  .qty-btn:active{border-color:var(--accent);color:var(--accent);}
  .qty-val{font-family:'Roboto Mono',monospace;font-size:12px;width:20px;text-align:center;font-weight:500;}tom:4px;background:var(--row-bg);cursor:pointer;min-height:56px;transition:all 0.15s;}
  /* Quote sidebar */
  .quote-panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);overflow:hidden;}
  @media(min-width:960px){.quote-panel{position:sticky;top:66px;}}
  .quote-head{padding:11px 14px;border-bottom:2px solid var(--accent);background:var(--panel2);display:flex;align-items:center;gap:10px;}
  .quote-head-icon{width:26px;height:26px;border-radius:4px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;}
  .quote-head h3{font-size:13px;font-weight:700;color:var(--text);}
  .quote-body{padding:11px 13px;}
  .quote-line{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border);gap:6px;}
  .quote-line:last-child{border-bottom:none;}
  .quote-line-left{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1;}
  .quote-line-label{color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .quote-line-labor{color:var(--accent);font-size:10px;font-family:'Roboto Mono',monospace;opacity:.8;}
  .quote-line-right{display:flex;flex-direction:column;align-items:flex-end;gap:1px;flex-shrink:0;}
  .quote-line-val{font-family:'Roboto Mono',monospace;color:var(--text);font-size:12px;font-weight:500;}
  .quote-line-amount{font-family:'Roboto Mono',monospace;color:var(--accent3);font-size:13px;font-weight:700;}
  .quote-total{margin-top:10px;padding:11px;background:linear-gradient(135deg,rgba(33,150,243,0.1),rgba(76,175,80,0.08));border:1px solid var(--accent);border-radius:8px;display:flex;justify-content:space-between;align-items:center;}
  .quote-total-label{font-size:13px;font-weight:700;color:var(--text);}
  .quote-total-val{font-family:'Roboto Mono',monospace;font-size:18px;color:var(--accent);font-weight:700;}

  /* Status boxes */
  .warn-box{background:rgba(255,152,0,0.08);border:1px solid var(--warn);border-radius:7px;padding:7px 10px;font-size:11px;color:var(--warn);margin-top:8px;}
  .ok-box{background:rgba(76,175,80,0.08);border:1px solid var(--accent3);border-radius:7px;padding:7px 10px;font-size:11px;color:var(--accent3);margin-top:8px;}

  /* Filter bars — wrap on mobile, no horizontal scroll */
  .builder-filters{display:flex;flex-wrap:wrap;align-items:center;gap:4px;padding:6px 10px;border-bottom:1px solid var(--border);background:var(--panel3);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap;}
  .bf-label{font-size:9px;color:var(--muted);font-family:'Roboto Mono',monospace;letter-spacing:1px;white-space:nowrap;text-transform:uppercase;flex-shrink:0;}
  .bf-chip{padding:4px 9px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:10px;font-family:'Roboto Mono',monospace;white-space:nowrap;flex-shrink:0;min-height:32px;}
  .bf-chip:active{background:var(--panel2);}
  .bf-chip.on{border-color:var(--accent);color:var(--accent);background:rgba(33,150,243,0.1);}
  .bf-chip.on-orange{border-color:var(--accent2);color:var(--accent2);background:rgba(245,124,0,0.1);}
  .bf-chip.on-green{border-color:var(--accent3);color:var(--accent3);background:rgba(76,175,80,0.1);}
  .bf-sep{display:none;}
  @media(min-width:680px){.bf-sep{display:block;width:1px;height:16px;background:var(--border);flex-shrink:0;}}
  .no-results{padding:20px;text-align:center;font-size:13px;color:var(--muted);font-family:'Roboto Mono',monospace;}
  .wire-run-row{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;}
  .wire-run-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .wire-run-label{font-size:12px;font-weight:700;color:var(--accent);font-family:'Roboto Mono',monospace;text-transform:uppercase;letter-spacing:.04em;}
  .wire-run-del{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;width:24px;height:24px;cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;}
  .wire-run-del:hover{border-color:#e57373;color:#e57373;}
  .wire-run-fields{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;}
  .wire-run-field{display:flex;flex-direction:column;gap:4px;}
  .wire-run-field-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-family:'Roboto Mono',monospace;}
  .wire-run-select{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:6px 8px;font-size:13px;font-family:'Roboto Mono',monospace;min-width:110px;cursor:pointer;}
  .wire-run-input{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:6px 8px;font-size:13px;font-family:'Roboto Mono',monospace;width:70px;text-align:right;}
  .wire-run-input:focus,.wire-run-select:focus{outline:none;border-color:var(--accent);}
  .wire-run-cost{min-width:60px;}
  .wire-run-cost-val{font-size:15px;font-weight:700;color:var(--accent3);font-family:'Roboto Mono',monospace;padding-bottom:4px;}
  .wire-run-use{margin-top:8px;font-size:11px;color:var(--muted);font-family:'Roboto Mono',monospace;}
  .wire-run-total{text-align:right;font-size:13px;font-weight:700;color:var(--accent3);font-family:'Roboto Mono',monospace;padding:8px 2px 0;}

  .builder-global-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:8px 11px;background:var(--panel);border:1px solid var(--border);border-radius:10px;}
  .bg-search{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:8px 11px;color:var(--text);font-size:14px;font-family:'Source Sans 3',sans-serif;outline:none;-webkit-appearance:none;}
  .bg-search:focus{border-color:var(--accent);}
  .bg-search::placeholder{color:var(--muted);}
  .bg-label{font-size:11px;color:var(--muted);font-family:'Roboto Mono',monospace;white-space:nowrap;}

  /* ─ CATALOG ─ */
  .catalog-grid{display:grid;grid-template-columns:1fr;gap:10px;}
  @media(min-width:480px){.catalog-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));}}
  .catalog-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;box-shadow:var(--shadow);}
  .catalog-card-brand{font-size:10px;color:var(--muted);font-family:'Roboto Mono',monospace;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
  .catalog-card-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px;}
  .catalog-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
  .catalog-tag{padding:3px 9px;border-radius:12px;font-size:10px;font-family:'Roboto Mono',monospace;background:var(--panel2);border:1px solid var(--border);color:var(--muted);}
  .catalog-tag.accent{border-color:var(--accent);color:var(--accent);background:rgba(33,150,243,0.08);}
  .catalog-tag.orange{border-color:var(--accent2);color:var(--accent2);background:rgba(245,124,0,0.08);}
  .catalog-tag.green{border-color:var(--accent3);color:var(--accent3);background:rgba(76,175,80,0.08);}
  .catalog-price{font-family:'Roboto Mono',monospace;font-size:15px;color:var(--accent3);margin-bottom:10px;font-weight:500;}
  .catalog-add-btn{width:100%;padding:11px;border-radius:8px;border:1px solid var(--accent);background:rgba(33,150,243,0.08);color:var(--accent);cursor:pointer;font-family:'Source Sans 3',sans-serif;font-weight:700;font-size:14px;min-height:44px;}
  .catalog-add-btn:active{background:var(--accent);color:#fff;}

  /* ─ ROOF PLANNER ─ */
  .roof-outer{display:flex;flex-direction:column;gap:14px;}
  .rv-lookup{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;box-shadow:var(--shadow);}
  .rv-lookup-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .rv-lookup-icon{width:26px;height:26px;border-radius:5px;background:var(--accent2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
  .rv-type-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px;}
  @media(min-width:400px){.rv-type-row{grid-template-columns:repeat(5,1fr);}}
  .rv-type-btn{padding:10px 6px;border-radius:8px;border:1px solid var(--border);background:var(--panel2);color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;text-align:center;min-height:44px;line-height:1.2;transition:all 0.15s;}
  .rv-type-btn:active{transform:scale(0.97);}
  .rv-type-btn.active{border-color:var(--accent2);color:var(--accent2);background:rgba(245,124,0,0.08);box-shadow:0 0 0 1.5px var(--accent2);}
  .rv-inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  @media(min-width:480px){.rv-inputs{grid-template-columns:2fr 2fr 1fr auto;align-items:end;}}
  .rv-field{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-size:16px;font-family:'Source Sans 3',sans-serif;outline:none;width:100%;-webkit-appearance:none;}
  .rv-field:focus{border-color:var(--accent);}
  .rv-field::placeholder{color:var(--muted);}
  .rv-search-btn{padding:12px 18px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:15px;font-weight:700;font-family:'Source Sans 3',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;min-height:48px;grid-column:span 2;width:100%;}
  @media(min-width:480px){.rv-search-btn{grid-column:auto;width:auto;}}
  .rv-search-btn:disabled{opacity:0.5;}
  .rv-result{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:10px;}
  .rv-result-title{font-weight:700;color:var(--text);margin-bottom:8px;font-size:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .rv-badge{padding:3px 10px;border-radius:12px;font-size:11px;font-family:'Roboto Mono',monospace;background:rgba(76,175,80,0.1);border:1px solid var(--accent3);color:var(--accent3);}
  .rv-dims{font-family:'Roboto Mono',monospace;font-size:12px;color:var(--accent);margin:6px 0 10px;}
  .rv-note{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:10px;}
  .rv-obs-label{font-size:11px;color:var(--muted);font-family:'Roboto Mono',monospace;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
  .rv-obs-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
  .rv-obs-tag{padding:5px 12px;border-radius:12px;font-size:11px;border:1px solid var(--accent2);color:var(--accent2);background:rgba(245,124,0,0.08);font-family:'Roboto Mono',monospace;}
  .rv-use-btn{width:100%;padding:13px;border-radius:8px;border:none;background:var(--accent3);color:#fff;cursor:pointer;font-size:15px;font-weight:700;font-family:'Source Sans 3',sans-serif;min-height:48px;}
  .rv-use-btn:active{opacity:0.85;}
  .rv-loading{display:flex;align-items:center;gap:10px;padding:14px;color:var(--muted);font-size:13px;}
  .spinner{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);border-top-color:var(--accent);animation:spin 0.7s linear infinite;flex-shrink:0;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .rv-error{background:rgba(239,83,80,0.08);border:1px solid var(--danger);border-radius:8px;padding:12px;color:var(--danger);font-size:13px;margin-top:10px;}

  .roof-canvas-wrap{background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow);}
  .roof-controls{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center;flex-wrap:wrap;background:var(--panel2);}
  .roof-svg-wrap{overflow:auto;padding:14px;background:var(--bg2);-webkit-overflow-scrolling:touch;}
  .roof-stat{display:flex;flex-direction:column;gap:2px;}
  .roof-stat-label{font-size:9px;color:var(--muted);font-family:'Roboto Mono',monospace;letter-spacing:1px;text-transform:uppercase;}
  .roof-stat-val{font-size:15px;font-family:'Roboto Mono',monospace;color:var(--accent);font-weight:500;}

  /* ─ QUOTE PAGE ─ */
  .summary-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
  @media(min-width:600px){.summary-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));}}
  .summary-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;box-shadow:var(--shadow);}
  .summary-card-label{font-size:9px;color:var(--muted);font-family:'Roboto Mono',monospace;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
  .summary-card-val{font-size:22px;font-weight:700;color:var(--accent);}
  .summary-card-sub{font-size:11px;color:var(--muted);margin-top:3px;}
  .divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
  .info-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;padding:10px 14px;background:var(--panel);border:1px solid var(--border);border-radius:10px;}
  .info-item{display:flex;flex-direction:column;gap:3px;flex-shrink:0;}
  .info-item-label{font-size:9px;color:var(--muted);font-family:'Roboto Mono',monospace;letter-spacing:1px;text-transform:uppercase;}
  .info-item-val{font-size:13px;font-weight:600;color:var(--text2);}
  .runtime-bar-wrap{margin-top:10px;}
  .runtime-bar-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;color:var(--muted);}
  .runtime-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
  .runtime-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent3),var(--accent));transition:width 0.5s;}

  /* Data tables — scrollable */
  .vtable-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .vtable{width:100%;border-collapse:collapse;font-size:13px;min-width:460px;}
  .vtable th{padding:8px 12px;text-align:left;background:var(--panel2);border-bottom:2px solid var(--accent);font-size:10px;font-family:'Roboto Mono',monospace;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:500;white-space:nowrap;}
  .vtable td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text2);}
  .vtable tr:last-child td{border-bottom:none;}
  .vtable .mono{font-family:'Roboto Mono',monospace;font-size:12px;}
  .vtable .val-blue{color:var(--accent);font-family:'Roboto Mono',monospace;font-weight:500;}
  .vtable .val-green{color:var(--accent3);font-family:'Roboto Mono',monospace;font-weight:500;}

  /* ─ CATALOG TAB ─ */
  .cat-topbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;padding:10px 12px;background:var(--panel);border:1px solid var(--border);border-radius:10px;}
  .cat-search-wrap{flex:1;min-width:120px;display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;}
  .cat-search-wrap:focus-within{border-color:var(--accent);}
  .cat-search{flex:1;border:none;background:transparent;outline:none;color:var(--text);font-size:16px;font-family:'Source Sans 3',sans-serif;}

  .cat-sort{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:9px 10px;color:var(--text);font-size:15px;font-family:'Source Sans 3',sans-serif;outline:none;cursor:pointer;-webkit-appearance:none;min-height:42px;}
  .cat-reset{padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-family:'Source Sans 3',sans-serif;font-weight:600;white-space:nowrap;min-height:42px;}
  .cat-tabs{display:flex;margin-bottom:0;background:var(--panel);border:1px solid var(--border);border-radius:10px 10px 0 0;overflow-x:auto;border-bottom:none;-webkit-overflow-scrolling:touch;scrollbar-width:none;}

  .cat-tab{flex-shrink:0;padding:10px 10px;border:none;border-right:1px solid var(--border);border-bottom:3px solid transparent;background:var(--panel);cursor:pointer;font-family:'Source Sans 3',sans-serif;font-size:12px;font-weight:600;color:var(--muted);transition:all 0.18s;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:65px;}
  .cat-tab:last-child{border-right:none;}
  .cat-tab:active{background:var(--panel2);}
  .cat-tab.active{background:var(--panel2);color:var(--accent);border-bottom-color:var(--accent);}
  .cat-tab-icon{font-size:18px;line-height:1;display:none;}
  .cat-tab-label{font-size:10px;white-space:nowrap;}
  .cat-tab-count{font-size:9px;padding:1px 6px;border-radius:10px;background:var(--panel3);color:var(--muted);font-family:'Roboto Mono',monospace;}
  .cat-tab-count.active{background:rgba(33,150,243,0.15);color:var(--accent);}
  .cat-filter-bar{display:flex;flex-wrap:wrap;align-items:center;gap:6px;padding:8px 12px;background:var(--panel2);border:1px solid var(--border);border-top:none;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap;}
  .cat-results-label{padding:6px 12px;font-size:11px;color:var(--muted);font-family:'Roboto Mono',monospace;background:var(--panel);border:1px solid var(--border);border-top:none;}
  .cat-table{border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;}

  .survey-input{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 12px;font-size:14px;font-family:'Source Sans 3',sans-serif;width:100%;box-sizing:border-box;-webkit-appearance:none;}
  .survey-input:focus{outline:none;border-color:var(--accent);}
  .survey-textarea{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 12px;font-size:14px;font-family:'Source Sans 3',sans-serif;width:100%;box-sizing:border-box;min-height:90px;resize:vertical;-webkit-appearance:none;}
  .survey-textarea:focus{outline:none;border-color:var(--accent);}
  .survey-tiles{display:flex;flex-wrap:wrap;gap:8px;}
  .survey-tile{padding:9px 14px;border-radius:9px;border:1.5px solid var(--border);background:var(--panel2);color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;font-family:'Source Sans 3',sans-serif;transition:all .15s;-webkit-tap-highlight-color:transparent;user-select:none;}
  .survey-tile:active{transform:scale(.96);}

  .survey-tile.sel-green{border-color:var(--accent3);background:rgba(76,175,80,0.12);color:var(--accent3);box-shadow:0 0 0 1px var(--accent3);}
  .survey-tile.sel-orange{border-color:var(--accent2);background:rgba(255,152,0,0.12);color:var(--accent2);box-shadow:0 0 0 1px var(--accent2);}
  .survey-tile-wide{padding:11px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--panel2);color:var(--text2);cursor:pointer;font-size:14px;font-weight:700;font-family:'Source Sans 3',sans-serif;display:flex;align-items:center;gap:8px;transition:all .15s;min-width:140px;flex:1;-webkit-tap-highlight-color:transparent;user-select:none;}
  .survey-tile-wide:active{transform:scale(.97);}
  .survey-tile-wide.selected{border-color:var(--accent);background:rgba(33,150,243,0.10);color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
  .survey-tile-wide.sel-green{border-color:var(--accent3);background:rgba(76,175,80,0.10);color:var(--accent3);box-shadow:0 0 0 1px var(--accent3);}
  .survey-sub{font-size:11px;color:var(--muted);margin-top:1px;font-weight:400;}
  .survey-check-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;}
  .survey-check-tile{padding:10px 12px;border-radius:9px;border:1.5px solid var(--border);background:var(--panel2);color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;font-family:'Source Sans 3',sans-serif;transition:all .15s;-webkit-tap-highlight-color:transparent;user-select:none;display:flex;align-items:center;gap:8px;}
  .survey-check-tile:active{transform:scale(.97);}

  .survey-check-box{width:16px;height:16px;border-radius:4px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s;}

  .survey-cta{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:16px 28px;font-size:16px;font-weight:800;font-family:'Source Sans 3',sans-serif;cursor:pointer;width:100%;margin-top:8px;transition:opacity .15s,transform .1s;letter-spacing:.02em;}

// ─── CATALOG TAB COMPONENT ────────────────────────────────────────────────────
const CATALOG_TABS = [
  { id: "inverters",   label: "Inverters",     icon: "" },
  { id: "mppTs",       label: "MPPTs",          icon: "" },
  { id: "batteries",   label: "Batteries",      icon: "" },
  { id: "panels",      label: "Panels",   icon: "" },
  { id: "accessories", label: "Accessories",    icon: "" },
  { id: "cable",       label: "Cables",   icon: "" },
];

const INV_FAMILIES = ["MultiPlus","MultiPlus-II","Quattro","RS Series"];
const MPPT_SERIES  = ["SmartSolar","SmartSolar RS","BlueSolar"];
const ACC_FAMILIES = ["GX Device","Display","Battery Monitor","Tank Monitor","Distribution","DC-DC Charger"];

function FilterChip({ label, active, color, onClick }) {
  const cls = active ? (color === "green" ? "bf-chip on-green" : color === "orange" ? "bf-chip on-orange" : "bf-chip on") : "bf-chip";
  return <button className={cls} onClick={onClick}>{label}</button>;
}

function CatalogTab({ theme, setTab, onAddWireRun }) {
  const [catTab, setCatTab] = useState("inverters");
  const [search, setSearch] = useState("");
  const [fInv,  setFInv]  = useState({ voltage: "all", family: "all", gx: "all", brand: "all" });
  const [fMppt, setFMppt] = useState({ series: "all", pvVolt: "all", current: "all" });
  const [fBatt, setFBatt] = useState({ voltage: "all", series: "all", heated: "all", ah: "all" });
  const [fPanel,setFPanel]= useState({ brand: "all", watts: "all" });
  const [fAcc,  setFAcc]  = useState({ family: "all" });
  const [sortBy, setSortBy] = useState("default");
  const [cableFtQtys, setCableFtQtys] = useState({});

  const tog = (setter, key, val) => setter(p => ({ ...p, [key]: p[key] === val ? "all" : val }));
  const ms  = (terms, q) => !q || terms.toLowerCase().includes(q.toLowerCase());

  const sortItems = (items, key) => {
    if (key === "price_asc")  return [...items].sort((a,b) => (a.price||0) - (b.price||0));
    if (key === "price_desc") return [...items].sort((a,b) => (b.price||0) - (a.price||0));
    if (key === "name")       return [...items].sort((a,b) => (a.model||a.name||"").localeCompare(b.model||b.name||""));
    return items;
  };

  const invItems = sortItems(PRODUCTS.inverters.filter(x =>
    (fInv.voltage === "all" || x.voltage === Number(fInv.voltage)) &&
    (fInv.family  === "all" || x.family === fInv.family) &&
    (fInv.brand   === "all" || x.brand === fInv.brand) &&
    (fInv.gx      === "all" || (fInv.gx === "yes" ? x.gx : !x.gx)) &&
    ms(`${x.model} ${x.family} ${x.brand} ${x.voltage}V ${x.va}VA`, search)
  ), sortBy);

  const mpptItems = sortItems(PRODUCTS.mppTs.filter(x => {
    const pvVal = fMppt.pvVolt;
    const pvMatch = pvVal === "all" ? true
      : MPPT_SERIES.includes(pvVal) ? x.series === pvVal
      : x.maxPV <= Number(pvVal) + 50 && x.maxPV >= Number(pvVal) - 25;
    return pvMatch &&
      (fMppt.series  === "all" || x.series === fMppt.series) &&
      (fMppt.current === "all" || x.maxA >= Number(fMppt.current)) &&
      ms(`${x.model} ${x.series} ${x.maxPV}V ${x.maxA}A`, search);
  }), sortBy);

  const battItems = sortItems(PRODUCTS.batteries.filter(x =>
    (fBatt.voltage === "all" || x.voltage === Number(fBatt.voltage)) &&
    (fBatt.series  === "all" || x.series === fBatt.series) &&
    (fBatt.heated  === "all" || (fBatt.heated === "yes" ? x.heated : !x.heated)) &&
    (fBatt.ah      === "all" || x.ah >= Number(fBatt.ah)) &&
    ms(`${x.brand} ${x.series} ${x.voltage}V ${x.ah}Ah`, search)
  ), sortBy);

  const panelItems = sortItems(PRODUCTS.panels.filter(x =>
    (fPanel.brand === "all" || x.brand === fPanel.brand) &&
    (fPanel.watts === "all" || x.watts >= Number(fPanel.watts)) &&
    ms(`${x.brand} ${x.model} ${x.watts}W`, search)
  ), sortBy);

  const accItems = sortItems(PRODUCTS.accessories.filter(x =>
    (fAcc.family === "all" || x.family === fAcc.family) &&
    ms(`${x.name} ${x.family}`, search)
  ), sortBy);

  const counts = {
    inverters: invItems.length,
    mppTs: mpptItems.length,
    batteries: battItems.length,
    panels: panelItems.length,
    accessories: accItems.length,
    cable: CABLE_PRICING.length,
  };

  const resetFilters = () => {
    setSearch(""); setSortBy("default");
    setFInv({ voltage:"all", family:"all", gx:"all" });
    setFMppt({ series:"all", pvVolt:"all", current:"all" });
    setFBatt({ voltage:"all", series:"all", heated:"all", ah:"all" });
    setFPanel({ brand:"all", watts:"all" });
    setFAcc({ family:"all" });
  };

  return (
    <div>
      <div className="page-header">
        <h1><span className="ph-icon"></span>Product Catalog</h1>
        <p>Full Victron, Epoch, and compatible RV electrical component reference.</p>
      </div>

      <div className="cat-topbar">
        <div className="cat-search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2.5" style={{flexShrink:0}}>
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            className="cat-search"
            placeholder="Search products…"
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
          {search && <button className="cat-clear" onClick={() => setSearch("")}>x</button>}
        </div>
        <div className="cat-sort-wrap">
          <span className="bf-label">SORT</span>
          <select className="cat-sort" value={sortBy} onChange={e => setSortBy(e.target.value)}>
            <option value="default">Default</option>
            <option value="price_asc">Price ↑</option>
            <option value="price_desc">Price ↓</option>
            <option value="name">Name A–Z</option>
          </select>
        </div>
        <button className="cat-reset" onClick={resetFilters}>Reset Filters</button>
      </div>

      <div className="cat-tabs">
        {CATALOG_TABS.map(t => (
          <button
            key={t.id}
            className={"cat-tab"+(catTab === t.id ? " active" : "")}
            onClick={() => setCatTab(t.id)}
          >
            <span className="cat-tab-icon">{t.icon}</span>
            <span className="cat-tab-label">{t.label}</span>
            <span className={"cat-tab-count"+(catTab === t.id ? " active" : "")}>{counts[t.id]}</span>
          </button>
        ))}
      </div>

      {catTab === "inverters" && (
        <div>
          <div className="cat-filter-bar">
            <span className="bf-label">BRAND</span>
            {["Victron","REDARC"].map(b => <FilterChip key={b} label={b} color="orange" active={fInv.brand===b} onClick={() => tog(setFInv,"brand",b)} />)}
            <div className="bf-sep"/>

async function fetchRoofInfo(rvType, make, model, year) {
  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 800,
        messages: [{ role: "user", content: "Return ONLY valid JSON, no markdown. For a " + rvType + " RV: " + year + " " + make + " " + model + ". Estimate roof dimensions and obstacles. Schema: {roofLengthFt:number,roofWidthFt:number,confidence:string,notes:string,obstacles:[{name:string,approxLengthIn:number,approxWidthIn:number}]}" }]
      })
    });
    const data = await response.json();
    const text = (data.content || []).map(function(b) { return b.text || ""; }).join("");
    const clean = text.replace(/```json|```/g, "").trim();
    return JSON.parse(clean);
  } catch(e) {
    throw new Error("Roof lookup failed: " + e.message);
  }
}

function RoofPlannerTab({ theme, coachInfo, rvType: intakeRvType }) {
  const RULER = 22;
  const SVG_W = 800;
  const CLEAR_IN = 6;

  const [selRvType, setSelRvType] = useState(intakeRvType || "Class A");
  const [make, setMake] = useState(coachInfo?.make || "");
  const [model, setModel] = useState(coachInfo?.model || "");
  const [year, setYear] = useState(coachInfo?.year || "");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [roofInfo, setRoofInfo] = useState(null);
  const [roofDims, setRoofDims] = useState({ lIn: 384, wIn: 96 });
  const [obstacles, setObstacles] = useState([
    { id:"ob_ac1", name:"A/C", xIn:80, yIn:22, lIn:40, wIn:30 },
    { id:"ob_v1",  name:"Vent", xIn:220, yIn:34, lIn:22, wIn:22 },
  ]);
  const [panels, setPanels] = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [panelModelId, setPanelModelId] = useState("ren_400");
  const [customL, setCustomL] = useState(60);
  const [customW, setCustomW] = useState(30);
  const [customWatts, setCustomWatts] = useState(300);
  const [snapIn, setSnapIn] = useState(1);
  const [showGrid, setShowGrid] = useState(true);
  const [showClear, setShowClear] = useState(true);
  const [dragging, setDragging] = useState(null);
  const svgRef = useRef(null);

  const scale = (SVG_W - RULER * 2) / roofDims.lIn;
  const SVG_H = RULER * 2 + roofDims.wIn * scale;

  const snap = (val) => Math.round(val / snapIn) * snapIn;

  const getPanelDims = (p) => {
    if (p.modelId === "custom") return { lIn: p.customL || 60, wIn: p.customW || 30, watts: p.customWatts || 300 };
    const m = PANEL_DIM_DB.find(d => d.id === (p.modelId || "ren_400")) || PANEL_DIM_DB[0];
    return p.rotated ? { lIn: m.wIn, wIn: m.lIn, watts: m.watts } : { lIn: m.lIn, wIn: m.wIn, watts: m.watts };
  };

  const lookupLocalDb = () => {
    const mNorm = make.trim().toLowerCase();
    const modNorm = model.trim().toLowerCase();
    return RV_ROOF_DB.find(r =>
      r.make.toLowerCase() === mNorm &&
      r.model.toLowerCase().includes(modNorm.split(" ")[0]) &&
      (r.types.includes(selRvType) || !selRvType)
    ) || null;
  };

  const applyRoofData = (lIn, wIn, obs) => {
    setRoofDims({ lIn, wIn });
    setObstacles(obs.map((o, i) => ({ ...o, id: o.id || ("ob_" + i) })));
    setPanels([]);
    setSelectedId(null);
  };

  const handleLookup = async () => {
    if (!make.trim()) return;
    setLoading(true); setError(null); setRoofInfo(null);
    const local = lookupLocalDb();
    if (local) {
      setRoofInfo({ source: "db", make: local.make, model: local.model });
      applyRoofData(local.lIn, local.wIn, local.obs.map((o,i) => ({ id:"ob_"+i, ...o })));
      setLoading(false);
      return;
    }
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514", max_tokens: 400,
          messages: [{ role: "user", content: "Return ONLY a JSON object (no markdown) for a " + selRvType + " " + year + " " + make + " " + model + " with keys: roofLengthFt, roofWidthFt, obstacles (array of {name,approxLengthIn,approxWidthIn}). Use best estimate." }]
        })
      });
      const d = await res.json();
      const txt = d.content?.[0]?.text || '{}';
      const data = JSON.parse(txt.replace(/```json|```/g,"").trim());
      const lIn = Math.round((data.roofLengthFt || 32) * 12);
      const wIn = Math.round((data.roofWidthFt || 8) * 12);
      const obs = (data.obstacles || []).map((o, i) => ({
        id: "ob_api_" + i, name: o.name,
        xIn: Math.round(lIn * (0.1 + i * 0.18)),
        yIn: Math.round(wIn * 0.25),
        lIn: o.approxLengthIn || 38,
        wIn: o.approxWidthIn || 28,
      }));
      setRoofInfo({ source: "api", make, model });
      applyRoofData(lIn, wIn, obs);
    } catch (e) {
      setError("Could not load roof data. Enter dimensions manually below.");
    } finally { setLoading(false); }
  };

  const getSvgCoords = (e) => {
    const svg = svgRef.current;
    if (!svg) return { svgX: 0, svgY: 0 };
    const rect = svg.getBoundingClientRect();
    const pt = e.touches ? e.touches[0] : e;
    return {
      svgX: (pt.clientX - rect.left) * (SVG_W / rect.width),
      svgY: (pt.clientY - rect.top) * (SVG_H / rect.height),
    };
  };

  const startDragPanel = (e, id) => {
    e.stopPropagation();
    const coords = getSvgCoords(e);
    const p = panels.find(x => x.id === id);
    if (!p) return;
    setSelectedId(id);
    setDragging({ type: "panel", id, startSvgX: coords.svgX, startSvgY: coords.svgY, startXIn: p.xIn, startYIn: p.yIn });
  };

  const startDragObs = (e, id) => {
    e.stopPropagation();
    const coords = getSvgCoords(e);
    const o = obstacles.find(x => x.id === id);
    if (!o) return;
    setSelectedId(id);
    setDragging({ type: "obs", id, startSvgX: coords.svgX, startSvgY: coords.svgY, startXIn: o.xIn, startYIn: o.yIn });
  };

  const onSvgMove = (e) => {
    if (!dragging) return;
    const coords = getSvgCoords(e);
    const dxIn = (coords.svgX - dragging.startSvgX) / scale;
    const dyIn = (coords.svgY - dragging.startSvgY) / scale;
    if (dragging.type === "panel") {
      setPanels(prev => prev.map(p => {
        if (p.id !== dragging.id) return p;
        const dims = getPanelDims(p);
        const xIn = snap(Math.max(0, Math.min(roofDims.lIn - dims.lIn, dragging.startXIn + dxIn)));
        const yIn = snap(Math.max(0, Math.min(roofDims.wIn - dims.wIn, dragging.startYIn + dyIn)));
        return { ...p, xIn, yIn };
      }));
    } else {
      setObstacles(prev => prev.map(o => {
        if (o.id !== dragging.id) return o;
        const xIn = snap(Math.max(0, Math.min(roofDims.lIn - o.lIn, dragging.startXIn + dxIn)));
        const yIn = snap(Math.max(0, Math.min(roofDims.wIn - o.wIn, dragging.startYIn + dyIn)));
        return { ...o, xIn, yIn };
      }));
    }
  };

  const endDrag = () => setDragging(null);

  const addPanel = () => {
    const m = PANEL_DIM_DB.find(d => d.id === panelModelId) || PANEL_DIM_DB[0];
    const lIn = panelModelId === "custom" ? customL : m.lIn;
    const wIn = panelModelId === "custom" ? customW : m.wIn;
    const col = panels.length % 3;
    const row = Math.floor(panels.length / 3);
    setPanels(prev => [...prev, {
      id: "p_" + Date.now(), modelId: panelModelId,
      xIn: snap(col * (lIn + 4)), yIn: snap(row * (wIn + 4)),
      rotated: false, customL: customL, customW: customW, customWatts: customWatts,
    }]);
  };

  const deleteSelected = () => {
    if (!selectedId) return;
    setPanels(prev => prev.filter(p => p.id !== selectedId));
    setObstacles(prev => prev.filter(o => o.id !== selectedId));
    setSelectedId(null);
  };

  const rotateSelected = () => {
    if (!selectedId) return;
    setPanels(prev => prev.map(p => p.id === selectedId ? { ...p, rotated: !p.rotated } : p));
  };

  const selPanel = panels.find(p => p.id === selectedId);
  const selObs = obstacles.find(o => o.id === selectedId);
  const totalWatts = panels.reduce((s, p) => s + getPanelDims(p).watts, 0);
  const roofAreaIn2 = roofDims.lIn * roofDims.wIn;
  const panelAreaIn2 = panels.reduce((s, p) => { const d = getPanelDims(p); return s + d.lIn * d.wIn; }, 0);
  const coveragePct = roofAreaIn2 > 0 ? Math.round(panelAreaIn2 / roofAreaIn2 * 100) : 0;
  const selPanelDims = selPanel ? getPanelDims(selPanel) : null;
  const selPanelModel = selPanel ? PANEL_DIM_DB.find(d => d.id === selPanel.modelId) : null;
  const activePanelModel = PANEL_DIM_DB.find(d => d.id === panelModelId);

  const darkerBg = theme === "dark" ? "#0d1a2a" : "#ddeeff";
  const darkerBorder = theme === "dark" ? "#253b55" : "#99bbdd";
  const obstFill = theme === "dark" ? "rgba(245,124,0,0.12)" : "rgba(245,124,0,0.15)";
  const gridColor = theme === "dark" ? "rgba(255,255,255,0.04)" : "rgba(0,0,0,0.06)";
  const rulerBg = theme === "dark" ? "#0e2035" : "#cce0f5";
  const textColor = theme === "dark" ? "#8ab4d4" : "#4477aa";
  const panelFill = "rgba(33,150,243,0.18)";
  const panelSelFill = "rgba(33,150,243,0.35)";
  const clearFill = "rgba(245,124,0,0.06)";

  const gridLines = [];
  if (showGrid) {
    for (let x = 0; x <= roofDims.lIn; x += 12) {
      const sx = RULER + x * scale;
      gridLines.push({ x1:sx, y1:RULER, x2:sx, y2:RULER + roofDims.wIn * scale, label: x % 24 === 0 ? (x/12) + "ft" : null, lx: sx, ly: RULER - 5 });
    }
    for (let y = 0; y <= roofDims.wIn; y += 12) {
      const sy = RULER + y * scale;
      gridLines.push({ x1:RULER, y1:sy, x2:RULER + roofDims.lIn * scale, y2:sy, label: y % 24 === 0 ? (y/12) + "ft" : null, lx: RULER - 4, ly: sy + 3, vert: true });
    }
  }

  return (
    <div>
      <div className="page-header">
        <h1><span className="ph-icon"></span>Roof Planner</h1>
        <p>Inch-accurate solar layout. Drag panels and obstacles. Factory data from manufacturer specs.</p>
      </div>

      <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:12}}>

        <div className="builder-section" style={{flex:"1 1 320px",minWidth:280}}>
          <div className="section-head" style={{background:"var(--panel2)"}}>
            <h3><span className="section-head-icon"></span>RV Lookup</h3>
          </div>
          <div className="section-body" style={{padding:"10px 14px"}}>
            <div className="rv-type-row" style={{marginBottom:10}}>
              {RV_TYPES_LIST.map(t => (
                <button key={t} className={"rv-type-btn"+(selRvType===t?" active":"")} onClick={()=>setSelRvType(t)}>{t}</button>
              ))}
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
              <input className="rv-field" placeholder="Make (e.g. Thor)" value={make} onChange={e=>setMake(e.target.value)} style={{flex:"1 1 120px"}}/>
              <input className="rv-field" placeholder="Model (e.g. Axis)" value={model} onChange={e=>setModel(e.target.value)} style={{flex:"1 1 120px"}}/>
              <input className="rv-field" placeholder="Year" value={year} onChange={e=>setYear(e.target.value)} style={{width:72,flexShrink:0}}/>
            </div>
            <button className="rv-search-btn" disabled={loading||!make.trim()} onClick={handleLookup} style={{width:"100%"}}>
              {loading ? <span className="spinner"/> : "Look Up Roof"}
            </button>
            {error && <div className="rv-error" style={{marginTop:8}}>! {error}</div>}
            {roofInfo && (
              <div style={{marginTop:10,padding:"8px 10px",background:"var(--panel2)",borderRadius:7,border:"1px solid var(--accent3)"}}>
                <div style={{fontSize:11,fontWeight:700,color:"var(--accent3)",marginBottom:4}}>
                  {roofInfo.source === "db" ? ("+ Factory DB: " + roofInfo.make + " " + roofInfo.model) : ("~ AI Estimate")}
                </div>
                <div style={{fontSize:11,color:"var(--text2)"}}>
                  {Math.round(roofDims.lIn/12*10)/10}ft x {Math.round(roofDims.wIn/12*10)/10}ft -- {obstacles.length} obstacles loaded
                </div>
              </div>
            )}
            <div style={{marginTop:12,borderTop:"1px solid var(--border)",paddingTop:10}}>
              <div style={{fontSize:11,fontWeight:600,color:"var(--text2)",marginBottom:8}}>Manual Roof Dimensions</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                <div>
                  <label style={{fontSize:10,color:"var(--muted)",display:"block",marginBottom:4}}>Length</label>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <input type="number" className="rv-field" value={Math.floor(roofDims.lIn/12)} min={10} max={58}
                      onChange={e=>{const ft=Number(e.target.value)||0;const curIn=roofDims.lIn%12;setRoofDims(p=>({...p,lIn:Math.max(120,ft*12+curIn)}));}}
                      style={{width:64}}/>
                    <span style={{fontSize:12,color:"var(--text2)",fontWeight:600}}>ft</span>
                    <input type="number" className="rv-field" value={roofDims.lIn%12} min={0} max={11}
                      onChange={e=>{const inches=Math.min(11,Math.max(0,Number(e.target.value)||0));const curFt=Math.floor(roofDims.lIn/12);setRoofDims(p=>({...p,lIn:Math.max(120,curFt*12+inches)}));}}
                      style={{width:56}}/>
                    <span style={{fontSize:12,color:"var(--text2)",fontWeight:600}}>in</span>
                    <span style={{fontSize:11,color:"var(--muted)",marginLeft:4}}>{roofDims.lIn} total in</span>
                  </div>
                </div>
                <div>
                  <label style={{fontSize:10,color:"var(--muted)",display:"block",marginBottom:4}}>Width</label>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <input type="number" className="rv-field" value={Math.floor(roofDims.wIn/12)} min={5} max={12}
                      onChange={e=>{const ft=Number(e.target.value)||0;const curIn=roofDims.wIn%12;setRoofDims(p=>({...p,wIn:Math.max(60,ft*12+curIn)}));}}
                      style={{width:64}}/>
                    <span style={{fontSize:12,color:"var(--text2)",fontWeight:600}}>ft</span>
                    <input type="number" className="rv-field" value={roofDims.wIn%12} min={0} max={11}
                      onChange={e=>{const inches=Math.min(11,Math.max(0,Number(e.target.value)||0));const curFt=Math.floor(roofDims.wIn/12);setRoofDims(p=>({...p,wIn:Math.max(60,curFt*12+inches)}));}}
                      style={{width:56}}/>
                    <span style={{fontSize:12,color:"var(--text2)",fontWeight:600}}>in</span>
                    <span style={{fontSize:11,color:"var(--muted)",marginLeft:4}}>{roofDims.wIn} total in</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div className="builder-section" style={{flex:"1 1 280px",minWidth:240}}>
          <div className="section-head" style={{background:"var(--panel2)"}}>
            <h3><span className="section-head-icon"></span>Panel Model</h3>
          </div>
          <div className="section-body" style={{padding:"10px 14px"}}>
            <select value={panelModelId} onChange={e=>setPanelModelId(e.target.value)}
              style={{width:"100%",marginBottom:8,padding:"6px 8px",borderRadius:6,border:"1px solid var(--border)",background:"var(--panel)",color:"var(--text)",fontSize:13}}>
              {PANEL_DIM_DB.map(m => (
                <option key={m.id} value={m.id}>{m.name}{m.watts ? " -- " + m.lIn + "x" + m.wIn + "in, " + m.watts + "W" : ""}</option>
              ))}
            </select>
            {panelModelId === "custom" && (
              <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:70}}>
                  <label style={{fontSize:10,color:"var(--muted)",display:"block",marginBottom:2}}>Length (in)</label>
                  <input type="number" className="rv-field" value={customL} onChange={e=>setCustomL(Number(e.target.value))} style={{width:"100%"}}/>
                </div>
                <div style={{flex:1,minWidth:70}}>
                  <label style={{fontSize:10,color:"var(--muted)",display:"block",marginBottom:2}}>Width (in)</label>
                  <input type="number" className="rv-field" value={customW} onChange={e=>setCustomW(Number(e.target.value))} style={{width:"100%"}}/>
                </div>
                <div style={{flex:1,minWidth:70}}>
                  <label style={{fontSize:10,color:"var(--muted)",display:"block",marginBottom:2}}>Watts</label>
                  <input type="number" className="rv-field" value={customWatts} onChange={e=>setCustomWatts(Number(e.target.value))} style={{width:"100%"}}/>
                </div>
              </div>
            )}
            {panelModelId !== "custom" && activePanelModel && (
              <div style={{fontSize:11,color:"var(--text2)",background:"var(--panel2)",padding:"6px 10px",borderRadius:6,marginBottom:10}}>
                {activePanelModel.lIn}in x {activePanelModel.wIn}in -- {activePanelModel.watts}W -- Area: {(activePanelModel.lIn*activePanelModel.wIn/144).toFixed(1)} sq ft
              </div>
            )}
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              <button className="bf-chip on-green" onClick={addPanel} style={{padding:"4px 12px",fontSize:12}}>+ Add Panel</button>
              {selectedId && panels.find(p=>p.id===selectedId) && (
                <button className="bf-chip" onClick={rotateSelected} style={{padding:"4px 10px",fontSize:12}}>Rotate 90</button>
              )}
              {selectedId && (
                <button className="bf-chip" onClick={deleteSelected} style={{padding:"4px 10px",fontSize:12,color:"var(--accent2)"}}>Delete</button>
              )}
            </div>
          </div>
        </div>

        <div className="builder-section" style={{flex:"1 1 220px",minWidth:200}}>
          <div className="section-head" style={{background:"var(--panel2)"}}>
            <h3><span className="section-head-icon"></span>Layout Stats</h3>
          </div>
          <div className="section-body" style={{padding:"10px 14px"}}>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <div style={{background:"var(--panel2)",borderRadius:7,padding:"8px 10px"}}>
                <div style={{fontSize:10,color:"var(--muted)"}}>Panels</div>
                <div style={{fontSize:18,fontWeight:700,color:"var(--accent)"}}>{panels.length}</div>
              </div>
              <div style={{background:"var(--panel2)",borderRadius:7,padding:"8px 10px"}}>
                <div style={{fontSize:10,color:"var(--muted)"}}>Total Watts</div>
                <div style={{fontSize:18,fontWeight:700,color:"var(--accent3)"}}>{totalWatts}W</div>
              </div>
              <div style={{background:"var(--panel2)",borderRadius:7,padding:"8px 10px"}}>
                <div style={{fontSize:10,color:"var(--muted)"}}>Roof Coverage</div>
                <div style={{fontSize:18,fontWeight:700,color:"var(--accent2)"}}>{coveragePct}%</div>
              </div>
            </div>
          </div>
        </div>

      </div>

      {selPanel && selPanelDims && (
        <div style={{background:"var(--panel2)",border:"1px solid var(--accent)",borderRadius:9,padding:"10px 16px",marginBottom:12,display:"flex",gap:16,flexWrap:"wrap",alignItems:"center"}}>
          <div style={{fontSize:12,fontWeight:700,color:"var(--accent)"}}>Selected: {selPanelModel ? selPanelModel.name : "Panel"}{selPanel.rotated ? " (rotated)" : ""}</div>
          <div style={{fontSize:12,color:"var(--text2)"}}>{selPanelDims.lIn}in L x {selPanelDims.wIn}in W -- {selPanelDims.watts}W</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <label style={{fontSize:11,color:"var(--muted)"}}>X (in):</label>
            <input type="number" value={Math.round(selPanel.xIn)} min={0} max={roofDims.lIn}
              onChange={e=>setPanels(prev=>prev.map(p=>p.id===selectedId?{...p,xIn:snap(Number(e.target.value))}:p))}
              style={{width:64,padding:"4px 6px",borderRadius:5,border:"1px solid var(--border)",background:"var(--panel)",color:"var(--text)",fontSize:12}}/>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <label style={{fontSize:11,color:"var(--muted)"}}>Y (in):</label>
            <input type="number" value={Math.round(selPanel.yIn)} min={0} max={roofDims.wIn}
              onChange={e=>setPanels(prev=>prev.map(p=>p.id===selectedId?{...p,yIn:snap(Number(e.target.value))}:p))}
              style={{width:64,padding:"4px 6px",borderRadius:5,border:"1px solid var(--border)",background:"var(--panel)",color:"var(--text)",fontSize:12}}/>
          </div>
          <div style={{fontSize:11,color:"var(--muted)"}}>{(selPanel.xIn/12).toFixed(1)}ft from front</div>
          <button onClick={()=>setSelectedId(null)} style={{marginLeft:"auto",background:"none",border:"none",color:"var(--muted)",fontSize:16,cursor:"pointer"}}>x</button>
        </div>
      )}

      {selObs && (
        <div style={{background:"var(--panel2)",border:"1px solid var(--accent2)",borderRadius:9,padding:"10px 16px",marginBottom:12,display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{fontSize:12,fontWeight:700,color:"var(--accent2)"}}>Obstacle: {selObs.name}</div>
          <label style={{fontSize:11,color:"var(--muted)"}}>X:</label>
          <input type="number" value={Math.round(selObs.xIn)} onChange={e=>setObstacles(prev=>prev.map(o=>o.id===selectedId?{...o,xIn:snap(Number(e.target.value))}:o))}
            style={{width:56,padding:"3px 6px",borderRadius:5,border:"1px solid var(--border)",background:"var(--panel)",color:"var(--text)",fontSize:12}}/>
          <label style={{fontSize:11,color:"var(--muted)"}}>Y:</label>
          <input type="number" value={Math.round(selObs.yIn)} onChange={e=>setObstacles(prev=>prev.map(o=>o.id===selectedId?{...o,yIn:snap(Number(e.target.value))}:o))}
            style={{width:56,padding:"3px 6px",borderRadius:5,border:"1px solid var(--border)",background:"var(--panel)",color:"var(--text)",fontSize:12}}/>
          <label style={{fontSize:11,color:"var(--muted)"}}>L:</label>
          <input type="number" value={Math.round(selObs.lIn)} onChange={e=>setObstacles(prev=>prev.map(o=>o.id===selectedId?{...o,lIn:Number(e.target.value)}:o))}
            style={{width:56,padding:"3px 6px",borderRadius:5,border:"1px solid var(--border)",background:"var(--panel)",color:"var(--text)",fontSize:12}}/>
          <label style={{fontSize:11,color:"var(--muted)"}}>W:</label>
          <input type="number" value={Math.round(selObs.wIn)} onChange={e=>setObstacles(prev=>prev.map(o=>o.id===selectedId?{...o,wIn:Number(e.target.value)}:o))}
            style={{width:56,padding:"3px 6px",borderRadius:5,border:"1px solid var(--border)",background:"var(--panel)",color:"var(--text)",fontSize:12}}/>
          <button onClick={()=>{setObstacles(prev=>prev.filter(o=>o.id!==selectedId));setSelectedId(null);}}
            style={{padding:"3px 10px",borderRadius:5,border:"1px solid var(--accent2)",background:"transparent",color:"var(--accent2)",fontSize:11,cursor:"pointer"}}>Remove</button>
          <button onClick={()=>setSelectedId(null)} style={{marginLeft:"auto",background:"none",border:"none",color:"var(--muted)",fontSize:16,cursor:"pointer"}}>x</button>
        </div>
      )}

      <div className="builder-section" style={{marginBottom:12}}>
        <div style={{display:"flex",gap:10,padding:"8px 14px",background:"var(--panel2)",borderRadius:"9px 9px 0 0",alignItems:"center",flexWrap:"wrap"}}>
          <div style={{fontSize:12,fontWeight:700,color:"var(--text)",flex:1}}>
            Roof Canvas -- {Math.round(roofDims.lIn/12*10)/10}ft x {Math.round(roofDims.wIn/12*10)/10}ft ({roofDims.lIn}in x {roofDims.wIn}in)
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <span style={{fontSize:11,color:"var(--muted)"}}>Snap:</span>
            {[1,3,6,12].map(s=>(
              <button key={s} onClick={()=>setSnapIn(s)} className={"bf-chip"+(snapIn===s?" on-green":"")} style={{padding:"2px 8px",fontSize:11}}>{s}in</button>
            ))}
            <div style={{width:1,height:16,background:"var(--border)",margin:"0 4px"}}/>
            <button onClick={()=>setShowGrid(p=>!p)} className={"bf-chip"+(showGrid?" on-green":"")} style={{padding:"2px 8px",fontSize:11}}>Grid</button>
            <button onClick={()=>setShowClear(p=>!p)} className={"bf-chip"+(showClear?" on-green":"")} style={{padding:"2px 8px",fontSize:11}}>Clearance</button>
            <div style={{width:1,height:16,background:"var(--border)",margin:"0 4px"}}/>
            <button onClick={()=>{setObstacles(p=>[...p,{id:"ob_"+Date.now(),name:"A/C",xIn:40,yIn:20,lIn:38,wIn:28}]);}} className="bf-chip" style={{padding:"2px 8px",fontSize:11}}>+ Obstacle</button>
            {panels.length > 0 && <button onClick={()=>{setPanels([]);setSelectedId(null);}} className="bf-chip" style={{padding:"2px 8px",fontSize:11,color:"var(--accent2)"}}>Clear Panels</button>}
          </div>
        </div>
        <div style={{overflowX:"auto",padding:"0 0 4px 0"}}>
          <svg
            ref={svgRef}
            viewBox={"0 0 " + SVG_W + " " + SVG_H}
            style={{width:"100%",minWidth:500,height:"auto",display:"block",cursor:dragging?"grabbing":"default"}}
            onMouseMove={onSvgMove} onMouseUp={endDrag} onMouseLeave={endDrag}
            onTouchMove={onSvgMove} onTouchEnd={endDrag}
            onClick={e=>{ if(e.target===svgRef.current) setSelectedId(null); }}
          >
            <rect x={0} y={0} width={SVG_W} height={SVG_H} fill={rulerBg}/>
            <rect x={RULER} y={RULER} width={roofDims.lIn*scale} height={roofDims.wIn*scale} fill={darkerBg} stroke={darkerBorder} strokeWidth={1}/>

            {showGrid && gridLines.map((g,i)=>(
              <line key={"g"+i} x1={g.x1} y1={g.y1} x2={g.x2} y2={g.y2} stroke={gridColor} strokeWidth={0.8}/>
            ))}
            {showGrid && gridLines.filter(g=>g.label).map((g,i)=>(
              <text key={"gl"+i} x={g.lx} y={g.ly} textAnchor={g.vert?"end":"middle"} fontSize={7} fill={textColor} fontFamily="monospace">{g.label}</text>
            ))}

            <text x={RULER + roofDims.lIn*scale/2} y={RULER-7} textAnchor="middle" fontSize={8} fill={textColor} fontFamily="monospace" fontWeight="600">{roofDims.lIn}in ROOF LENGTH</text>
            <text x={RULER-8} y={RULER + roofDims.wIn*scale/2} textAnchor="middle" fontSize={7} fill={textColor} fontFamily="monospace" fontWeight="600" transform={"rotate(-90," + (RULER-8) + "," + (RULER + roofDims.wIn*scale/2) + ")"}>WIDTH {roofDims.wIn}in</text>

            {showClear && obstacles.map(o=>(
              <rect key={"cl"+o.id} x={RULER+(o.xIn-CLEAR_IN)*scale} y={RULER+(o.yIn-CLEAR_IN)*scale}
                width={(o.lIn+CLEAR_IN*2)*scale} height={(o.wIn+CLEAR_IN*2)*scale}
                fill={clearFill} stroke="rgba(245,124,0,0.15)" strokeWidth={0.8} strokeDasharray="3 2" rx={1}/>
            ))}

            {obstacles.map(o=>{
              const sx = RULER + o.xIn*scale;
              const sy = RULER + o.yIn*scale;
              const sw = o.lIn*scale;
              const sh = o.wIn*scale;
              const isSel = selectedId===o.id;
              return (
                <g key={o.id} style={{cursor:"move"}} onMouseDown={e=>startDragObs(e,o.id)} onTouchStart={e=>startDragObs(e,o.id)}>
                  <rect x={sx} y={sy} width={sw} height={sh} fill={obstFill} stroke={isSel?"var(--accent2)":"rgba(245,124,0,0.7)"} strokeWidth={isSel?2:1} rx={2}/>
                  <text x={sx+sw/2} y={sy+sh/2+3} textAnchor="middle" fontSize={Math.min(9,sw/3.5)} fill="rgba(245,124,0,0.9)" fontFamily="monospace" style={{pointerEvents:"none"}}>{o.name}</text>
                  <text x={sx+sw/2} y={sy+sh-3} textAnchor="middle" fontSize={Math.min(7,sw/5)} fill="rgba(245,124,0,0.55)" fontFamily="monospace" style={{pointerEvents:"none"}}>{o.lIn}x{o.wIn}in</text>
                </g>
              );
            })}

            {panels.map((p,idx)=>{
              const dims = getPanelDims(p);
              const sx = RULER + p.xIn*scale;
              const sy = RULER + p.yIn*scale;
              const sw = dims.lIn*scale;
              const sh = dims.wIn*scale;
              const isSel = selectedId===p.id;
              const pm = PANEL_DIM_DB.find(d=>d.id===p.modelId);
              return (
                <g key={p.id} style={{cursor:"grab"}} onMouseDown={e=>startDragPanel(e,p.id)} onTouchStart={e=>startDragPanel(e,p.id)}>
                  <rect x={sx} y={sy} width={sw} height={sh} fill={isSel?panelSelFill:panelFill} stroke={isSel?"#42a5f5":"#2196f3"} strokeWidth={isSel?2:1} rx={2}/>
                  <text x={sx+sw/2} y={sy+sh/2-2} textAnchor="middle" fontSize={Math.min(8,sw/5)} fill="#64b5f6" fontFamily="monospace" fontWeight="600" style={{pointerEvents:"none"}}>{dims.watts}W</text>
                  <text x={sx+sw/2} y={sy+sh/2+8} textAnchor="middle" fontSize={Math.min(7,sw/6)} fill="#5090c0" fontFamily="monospace" style={{pointerEvents:"none"}}>{dims.lIn}x{dims.wIn}in</text>
                  <text x={sx+4} y={sy+10} fontSize={6} fill="rgba(100,181,246,0.5)" fontFamily="monospace" style={{pointerEvents:"none"}}>{idx+1}</text>
                  {isSel && (
                    <rect x={sx} y={sy} width={sw} height={sh} fill="none" stroke="#42a5f5" strokeWidth={2.5} strokeDasharray="4 2" rx={3}/>
                  )}
                </g>
              );
            })}

            {panels.length===0 && (
              <text x={RULER+roofDims.lIn*scale/2} y={RULER+roofDims.wIn*scale/2+4} textAnchor="middle" fontSize={11} fill={textColor} fontFamily="monospace">Add panels using the Panel Model section above</text>
            )}
          </svg>
        </div>
        <div style={{padding:"6px 14px",background:"var(--panel2)",borderRadius:"0 0 9px 9px",display:"flex",gap:16,flexWrap:"wrap",fontSize:11,color:"var(--muted)"}}>
          <span>Orange = obstacles (draggable)</span>
          <span>Blue = panels (drag to position, click to select)</span>
          <span>Dashed orange = 6in clearance zone</span>
          {selPanel && selPanelDims && (
            <span style={{color:"var(--accent)"}}>Selected at {Math.round(selPanel.xIn)}in, {Math.round(selPanel.yIn)}in -- {selPanelDims.lIn}in x {selPanelDims.wIn}in</span>
          )}
        </div>
      </div>

    </div>
  );
}


// ── Login Gate Component ─────────────────────────────────────────────────────
function LoginGate({ onAuth }) {
    const [error, setError] = React.useState('');
    const [checking, setChecking] = React.useState(true);

    React.useEffect(() => {
        // Check stored identity first
        const identity = loadSolarIdentity();
        if (identity && canAccessSolar(identity.email)) {
            solarCurrentUser = identity;
            onAuth(identity);
        } else if (identity && !canAccessSolar(identity.email)) {
            setError(`Access denied — ${identity.email} does not have Solar role. Contact Roland.`);
            setChecking(false);
        } else {
            setChecking(false);
        }
    }, []);

    React.useEffect(() => {
        if (checking) return;
        // Initialize Google sign-in
        const tryInit = setInterval(() => {
            if (typeof google !== 'undefined' && google.accounts) {
                clearInterval(tryInit);
                google.accounts.id.initialize({
                    client_id: GOOGLE_CLIENT_ID,
                    callback: (resp) => {
                        try {
                            const payload = JSON.parse(atob(resp.credential.split('.')[1]));
                            if (!canAccessSolar(payload.email)) {
                                setError(`Access denied — ${payload.email} does not have Solar role. Contact Roland.`);
                                return;
                            }
                            solarCurrentUser = { email: payload.email, name: payload.name, savedAt: Date.now() };
                            localStorage.setItem('prvs_user_identity', JSON.stringify(solarCurrentUser));
                            onAuth(solarCurrentUser);
                        } catch(e) { setError('Sign-in failed. Please try again.'); }
                    },
                    auto_select: true,
                });
                google.accounts.id.renderButton(
                    document.getElementById('solarSignInBtn'),
                    { theme: 'outline', size: 'large', width: 300 }
                );
                google.accounts.id.prompt();
            }
        }, 200);
        return () => clearInterval(tryInit);
    }, [checking]);

    if (checking) return null;

    return (
        <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0e1520',padding:20}}>
            <div style={{background:'#1a2535',border:'1px solid #2d4060',borderRadius:16,padding:40,maxWidth:400,width:'100%',textAlign:'center',boxShadow:'0 20px 60px rgba(0,0,0,0.4)'}}>

function App() {
  const saved = loadSession();
  const [theme, setTheme] = useState(saved?.theme || "dark");
  const css = buildCss(THEMES[theme]);
  const [tab, setTab] = useState(saved?.tab || "intake");
  const [step, setStep] = useState(saved?.step || 0);
  const [goal, setGoal] = useState(saved?.goal || null);
  const [rvType, setRvType] = useState(saved?.rvType || null);
  const [coachInfo, setCoachInfo] = useState(saved?.coachInfo || { make: "", model: "", year: "" });
  const [customerInfo, setCustomerInfo] = useState(saved?.customerInfo || { name: "", phone: "", email: "", bestTime: "" });
  const [survey, setSurvey] = useState(saved?.survey || {rvLength:"",shoreService:"",hasGenerator:"",generatorKw:"",currentBattType:"",currentBattAh:"",hasInverter:"",currentInverterW:"",campStyle:"",appliances:[],budget:"",timeline:"",notes:""});
  const [inverterQtys, setInverterQtys] = useState(saved?.inverterQtys || {});
  const [mpptQtys, setMpptQtys] = useState(saved?.mpptQtys || {});
  const [batteryQtys, setBatteryQtys] = useState(saved?.batteryQtys || {});
  const [panelQtys, setPanelQtys] = useState(saved?.panelQtys || {});
  const [accessoryQtys, setAccessoryQtys] = useState(saved?.accessoryQtys || {});
  const [bosQtys, setBosQtys] = useState(saved?.bosQtys || {});
  // wireRuns: [{ id, awg, strands, feet }]
  const [wireRuns, setWireRuns] = useState(saved?.wireRuns || []);

  // Builder per-section filters
  const [invFilters, setInvFilters] = useState({ voltage: "all", family: "all", brand: "all" });
  const [mpptFilters, setMpptFilters] = useState({ pvVolt: "all", current: "all" });
  const [battFilters, setBattFilters] = useState({ voltage: "all", series: "all", heated: "all" });
  const [panelFilters, setPanelFilters] = useState({ brand: "all", watts: "all" });
  const [accFilters, setAccFilters] = useState({ family: "all" });
  const [builderSearch, setBuilderSearch] = useState("");
  const [builderTab, setBuilderTab] = useState("equipment");
  const [collapsed, setCollapsed] = useState({ inverter: false, mppt: false, battery: false, panels: false, accessories: false, wire: false, wireRecs: false, quotePanel: false });
  const [recAwgOverrides, setRecAwgOverrides] = useState({}); // { [recId]: awg }
  const toggleSection = (key) => { setCollapsed(p => ({ ...p, [key]: !p[key] })); };

  // ── Load Calculator ──────────────────────────────────────────────────────
  const [loads, setLoads] = useState(saved?.loads || []);
  const [loadSysV, setLoadSysV] = useState(saved?.loadSysV || 12);

  // ── Photos / Site Notes ──────────────────────────────────────────────────
  const [sitePhotos, setSitePhotos] = useState(saved?.sitePhotos || []);
  const [siteNotes, setSiteNotes] = useState(saved?.siteNotes || "");

  // ── Alternator / Shore Charging ──────────────────────────────────────────
  const [altAmps, setAltAmps] = useState(saved?.altAmps || "");
  const [dcDcChgAmps, setDcDcChgAmps] = useState(saved?.dcDcChgAmps || "");
  const [shoreAmps, setShoreAmps] = useState(saved?.shoreAmps || 30);
  const [genKw, setGenKw] = useState(saved?.genKw || "");

  // ── Existing System (Comparison) ─────────────────────────────────────────
  const [existing, setExisting] = useState(saved?.existing || {
    battAh:"", battV:12, battType:"AGM", invW:"", invBrand:"", solarW:"", hasShore:false, shoreA:30
  });

  // ── Multi-Project ────────────────────────────────────────────────────────
  const [projects, setProjects] = useState(() => loadProjects());
  const [projectName, setProjectName] = useState(saved?.projectName || "");
  const [projectsTab, setProjectsTab] = useState("saved");

  // ── Wire Size Chart ──────────────────────────────────────────────────────
  const [wsAmps, setWsAmps] = useState(100);
  const [wsLen, setWsLen] = useState(10);
  const [wsSysV, setWsSysV] = useState(12);

  // ── Sub-tab states ────────────────────────────────────────────────────────
  const [loadsSubTab, setLoadsSubTab] = useState("calculator");
  const [smsPhone, setSmsPhone] = useState("");
  const [laborRate, setLaborRate] = useState(195);
  const [showPricingModal, setShowPricingModal] = useState(false);
  const [productPriceOverrides, setProductPriceOverrides] = useState({});
  const [showSmsModal, setShowSmsModal] = useState(false);
  const [showClearModal, setShowClearModal] = useState(false);
  const [history, setHistory] = useState([]);
  const [toast, setToast] = useState(null); // {msg, type}

  // ── Toast helper ─────────────────────────────────────────────────────────
  const showToast = (msg, type="info") => {
    setToast({msg, type});
    setTimeout(() => setToast(null), 2800);
  };

  // ── Undo snapshot helper ──────────────────────────────────────────────────
  const snapBuild = () => ({
    inverterQtys:{...inverterQtys}, mpptQtys:{...mpptQtys},
    batteryQtys:{...batteryQtys}, panelQtys:{...panelQtys},
    accessoryQtys:{...accessoryQtys}, bosQtys:{...bosQtys},
    wireRuns:[...wireRuns], loads:[...loads],
  });
  const pushHistory = () => setHistory(h => [...h.slice(-29), snapBuild()]);
  const handleUndo = () => {
    if (history.length === 0) { showToast("Nothing to undo", "warn"); return; }
    const prev = history[history.length - 1];
    setHistory(h => h.slice(0, -1));
    setInverterQtys(prev.inverterQtys); setMpptQtys(prev.mpptQtys);
    setBatteryQtys(prev.batteryQtys); setPanelQtys(prev.panelQtys);
    setAccessoryQtys(prev.accessoryQtys); setBosQtys(prev.bosQtys);
    setWireRuns(prev.wireRuns); setLoads(prev.loads);
    showToast("Undone", "ok");

    }

    // ── Distributor capacity planning ──────────────────────────────────────
    if (totalSlots > 0) {
      const distHave = accessoryQtys["lynx_distributor"] || 0;
      const slotDetail = [
        invSlots   > 0 && `${totalInvQ} inverter${totalInvQ>1?"s":""} × 2 slots = ${invSlots}`,

      const status = distHave >= distNeeded ? "ok" : distHave > 0 ? "warn" : "info";
      tips.push({ type: status, icon: distHave >= distNeeded ? "✓" : "⬡", title: `Lynx Distributor Slots: ${totalSlots} used of ${distNeeded*4} (need ${distNeeded}x Distributor)`,
        body: `${slotDetail}. Each Lynx Distributor has 4 Mega-fuse slots. ` +
          (distNeeded > 1 ? `Your build needs ${distNeeded} Distributors chained together. Chain order: Power In → Shunt → Distributor 1 → Distributor 2.` : `One Distributor covers your build with ${4-totalSlots} slot${4-totalSlots!==1?"s":""} to spare.`) });

        body: "You have a Cerbo GX but no Lynx Shunt VE.Can. Without the Shunt in the chain, the Cerbo has no SoC data. Add the Lynx Shunt between the Power In and Distributor — it connects to the Cerbo via a VE.Can cable." });
    }

      tips.push({ type: "ok", icon: "✓", title: "Epoch Elite — Native Victron Comms",

    }

    return tips;
  })();

  const generateROId = (customerName, rv, dateReceived) => {
    const raw = `${customerName}|${rv}|${dateReceived}`.toLowerCase().trim();
    let hash = 0;
    for (let i = 0; i < raw.length; i++) {
        hash = ((hash << 5) - hash) + raw.charCodeAt(i);
        hash |= 0;
    }
    const hex = Math.abs(hash).toString(16).toUpperCase().padStart(8, '0');
    return `PRVS-${hex.slice(0,4)}-${hex.slice(4,8)}`;
  };
