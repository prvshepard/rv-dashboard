// ── IndexedDB Offline Queue ───────────────────────────────────
const IDB_NAME    = 'prvs_checkin';
const IDB_STORE   = 'sync_queue';
let idb = null;

function openIDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open(IDB_NAME, 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE, { keyPath: 'id', autoIncrement: true });
        req.onsuccess = e => { idb = e.target.result; resolve(idb); };
        req.onerror   = () => reject(req.error);
    });
}

async function queueOfflineAction(action) {
    if (!idb) return;
    return new Promise((resolve, reject) => {
        const tx  = idb.transaction(IDB_STORE, 'readwrite');
        const req = tx.objectStore(IDB_STORE).add({ ...action, queuedAt: new Date().toISOString() });
        req.onsuccess = () => resolve(req.result);
        req.onerror   = () => reject(req.error);
    });
}

async function getQueuedActions() {
    if (!idb) return [];
    return new Promise((resolve, reject) => {
        const tx  = idb.transaction(IDB_STORE, 'readonly');
        const req = tx.objectStore(IDB_STORE).getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror   = () => reject(req.error);
    });
}

async function removeQueuedAction(id) {
    if (!idb) return;
    return new Promise((resolve, reject) => {
        const tx  = idb.transaction(IDB_STORE, 'readwrite');
        const req = tx.objectStore(IDB_STORE).delete(id);
        req.onsuccess = () => resolve();
        req.onerror   = () => reject(req.error);
    });
}

// ── Online/Offline Handling ───────────────────────────────────
window.addEventListener('online',  () => { isOnline = true;  updateSyncBanner(); drainQueue(); });
window.addEventListener('offline', () => { isOnline = false; updateSyncBanner(); });

function updateSyncBanner() {
    const el = document.getElementById('syncBanner');
    if (!el) return;
    if (!isOnline) {
        el.className = 'sync-banner offline';
        el.textContent = t('📵 Offline — actions will sync when reconnected');
        el.style.display = 'block';
    } else {
        el.style.display = 'none';
    }
}

async function drainQueue() {
    const items = await getQueuedActions();
    if (!items.length) return;

    const banner = document.getElementById('syncBanner');
    if (banner) { banner.className = 'sync-banner syncing'; banner.textContent = `🔄 Syncing ${items.length} offline action(s)...`; banner.style.display = 'block'; }

    for (const item of items) {
        try {
            if (item.type === 'clock_in') {
                const { error } = await getSB().from('time_logs').insert(item.data);
                if (!error) await removeQueuedAction(item.id);
            } else if (item.type === 'clock_out') {
                const { error } = await getSB().from('time_logs').update(item.data).eq('id', item.logId);
                if (!error) await removeQueuedAction(item.id);
            }
        } catch(e) {
            console.warn('Queue drain error:', e);
        }
    }

    if (banner) banner.style.display = 'none';
    console.log('✅ Offline queue drained');
}

async function handleSignIn(response) {
    try {
        // Decode JWT to get user info
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        currentUser = { email: payload.email, name: payload.name, id: payload.sub };
        console.log('✅ Signed in as:', currentUser.name);

        // Store identity with timestamp for 30-day persistence
        const identityRecord = { email: currentUser.email, name: currentUser.name, savedAt: Date.now() };
        localStorage.setItem('prvs_user_identity', JSON.stringify(identityRecord));
        localStorage.setItem('prvs_checkin_user', JSON.stringify(currentUser));

        await loadAndRender();
    } catch(e) {
        // Try cached user for offline
        const cached = localStorage.getItem('prvs_checkin_user');
        if (cached) {
            currentUser = JSON.parse(cached);
            await loadAndRender();
        } else {
            showError('Sign-in failed. Please try again.');
        }
    }
}

// ── Load RO + Active Session ──────────────────────────────────
async function loadAndRender() {
    showLoading(t('Loading RO...'));

    if (isOnline) {
        try {
            // Load RO data — support both PRVS-XXXX-XXXX and legacy RO-Name-Date formats
            let ro = null;
            let roErr = null;

            if (roIdParam.startsWith('PRVS-')) {
                // New format — direct lookup
                const result = await getSB()
                    .from('repair_orders')
                    .select('*')
                    .eq('ro_id', roIdParam)
                    .maybeSingle();
                ro = result.data;
                roErr = result.error;
            } else {
                // Legacy format — try to extract customer name and find by name
                // Format: RO-FirstName-LastName-YYYY-MM-DD
                const parts = roIdParam.replace('RO-', '').split('-');
                const datePart = parts.slice(-3).join('-'); // YYYY-MM-DD
                const namePart = parts.slice(0, -3).join(' ');
                console.warn('Legacy RO ID format detected:', roIdParam, '— searching by name:', namePart);
                const result = await getSB()
                    .from('repair_orders')
                    .select('*')
                    .ilike('customer_name', '%' + namePart + '%')
                    .limit(1)
                    .maybeSingle();
                ro = result.data;
                roErr = result.error;
                if (!ro) throw new Error('This QR code uses the old format. Please use the Tech Check-In button on the dashboard to get an updated QR code for ' + namePart + '.');
            }

            if (roErr) throw roErr;
            if (!ro) throw new Error('RO not found: ' + roIdParam);
            roData = ro;

            // Check for any active session for this user (any RO)
            const { data: activeLogs } = await getSB()
                .from('time_logs')
                .select('*')
                .eq('tech_email', currentUser.email)
                .is('clock_out', null)
                .order('clock_in', { ascending: false })
                .limit(1);

            const anyActiveSession = activeLogs?.[0] || null;

            // If active session is on a DIFFERENT RO — prompt and auto clock-out
            if (anyActiveSession && anyActiveSession.ro_id !== roData.id) {
                try {
                    await autoClockOut(anyActiveSession);
                    // Show banner on next render
                    if (window._autoClockoutMsg) {
                        // Will be picked up by render()
                    }
                } catch(e) {
                    if (e.message === 'CANCELLED') {
                        // Tech cancelled — go back
                        showError('Clock-in cancelled. You are still clocked in to the previous RO.');
                        return;
                    }
                    throw e;
                }
            }

            // Check for active session on THIS RO
            const { data: thisLogs } = await getSB()
                .from('time_logs')
                .select('*')
                .eq('ro_id', roData.id)
                .eq('tech_email', currentUser.email)
                .is('clock_out', null)
                .order('clock_in', { ascending: false })
                .limit(1);

            activeSession = thisLogs?.[0] || null;

        } catch(e) {
            console.warn('Online load failed, using cached data:', e);
            loadFromCache();
        }
    } else {
        loadFromCache();
    }

    render();
}

function loadFromCache() {
    const cachedRO = localStorage.getItem('prvs_ro_' + roIdParam);
    if (cachedRO) {
        roData = JSON.parse(cachedRO);
    } else {
        roData = { ro_id: roIdParam, customer_name: 'Unknown (Offline)', rv: '', status: '', technician: '' };
    }
    const cachedSession = localStorage.getItem('prvs_session_' + roIdParam + '_' + (currentUser?.email || ''));
    activeSession = cachedSession ? JSON.parse(cachedSession) : null;
}

async function autoClockOut(session) {
    // Look up the previous RO name for the prompt
    let prevROName = 'previous RO';
    if (isOnline) {
        const { data: prevRO } = await getSB()
            .from('repair_orders')
            .select('customer_name, ro_id')
            .eq('id', session.ro_id)
            .maybeSingle();
        if (prevRO) prevROName = `${prevRO.customer_name} (${prevRO.ro_id})`;
    }

    // Ask tech how long ago they finished
    const answer = await showFinishedTimePrompt(prevROName, session.clock_in);
    if (answer === null) {
        // Tech cancelled — don't proceed to new RO
        throw new Error('CANCELLED');
    }

    // answer is minutes ago they actually finished
    const now = new Date();
    // Cap adjustment so clock_out never goes before clock_in
    const maxAdjustMinutes = Math.floor((now - new Date(session.clock_in)) / 60000);
    const adjustMinutes = Math.min(answer, maxAdjustMinutes);
    const clockOutTime = new Date(now.getTime() - (adjustMinutes * 60 * 1000));
    const duration = Math.max(0, Math.round((clockOutTime - new Date(session.clock_in)) / 1000));

    const updateData = {
        clock_out:        clockOutTime.toISOString(),
        duration_seconds: duration,
        updated_at:       now.toISOString(),
        work_notes:       (session.work_notes || '') + (session.work_notes ? '\n' : '') + '[Auto clocked out — tech indicated finished ' + answer + ' min ago]',
    };

    console.log(`🔄 Auto clocking out of ${prevROName}, adjusted by -${answer} min. Duration: ${Math.round(duration/60)} min`);

    if (isOnline) {
        await getSB().from('time_logs').update(updateData).eq('id', session.id);
    } else {
        await queueOfflineAction({ type: 'clock_out', logId: session.id, data: updateData });
    }
    localStorage.removeItem('prvs_session_' + roIdParam + '_' + currentUser.email);

    // Flag so render() can show a banner
    window._autoClockoutMsg = `Auto clocked out of ${prevROName} — adjusted by ${answer} min.`;
}

function showFinishedTimePrompt(prevROName, clockInTime) {
    return new Promise((resolve) => {
        const clockInStr = new Date(clockInTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const elapsed = Math.round((Date.now() - new Date(clockInTime)) / 60000);

        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
        overlay.innerHTML = `
            <div style="background:white;border-radius:16px;padding:28px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.4);">
                <div style="font-size:36px;text-align:center;margin-bottom:12px;">⚠️</div>
                <h2 style="color:#92400e;font-size:18px;font-weight:700;margin-bottom:8px;text-align:center;">${t('Still Clocked In!')}</h2>
                <p style="color:#64748b;font-size:14px;margin-bottom:6px;text-align:center;">
                    ${t('You are clocked in to:')}
                </p>
                <p style="color:#1e293b;font-size:15px;font-weight:700;margin-bottom:6px;text-align:center;">${prevROName}</p>
                <p style="color:#64748b;font-size:13px;margin-bottom:20px;text-align:center;">
                    Since ${clockInStr} (${elapsed} min ago)
                </p>

                <label style="display:block;font-size:14px;font-weight:600;color:#475569;margin-bottom:6px;">
                    ${t('How long ago did you finish that RO?')} <span style="color:#ef4444;font-weight:700;">*</span>
                    <span style="color:#94a3b8;font-weight:400;font-size:13px;"> ${t('(minutes — required)')}</span>
                </label>

                <input type="number" id="finishedMins" min="0" max="${elapsed}"
                    placeholder="${t('Enter minutes ago...')}"
                    oninput="document.getElementById('confirmAutoClockout').disabled = !this.value || parseInt(this.value) < 0"
                    style="width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:8px;font-size:16px;margin-bottom:16px;">

                <div style="display:flex;gap:8px;">
                    <button id="cancelAutoClockout" style="flex:1;padding:12px;background:#f1f5f9;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;color:#475569;">
                        ${t('Cancel')}
                    </button>
                    <button id="confirmAutoClockout" disabled style="flex:2;padding:12px;background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;color:white;opacity:0.5;">
                        ${t('✅ Clock Out & Switch RO')}
                    </button>
                </div>
            </div>`;

        document.body.appendChild(overlay);

        document.getElementById('finishedMins').addEventListener('input', function() {
            const btn = document.getElementById('confirmAutoClockout');
            const valid = this.value !== '' && parseInt(this.value) >= 0;
            btn.disabled = !valid;
            btn.style.opacity = valid ? '1' : '0.5';
        });

        document.getElementById('confirmAutoClockout').addEventListener('click', () => {
            const val = parseInt(document.getElementById('finishedMins').value);
            if (isNaN(val) || val < 0) {
                alert('Please enter how many minutes ago you finished.');
                return;
            }
            overlay.remove();
            resolve(val);
        });

        document.getElementById('cancelAutoClockout').addEventListener('click', () => {
            overlay.remove();
            resolve(null);
        });
    });
}

// ── Render ────────────────────────────────────────────────────
function render() {
    if (!roData) { showError('Could not load RO data.'); return; }

    // Cache RO for offline
    localStorage.setItem('prvs_ro_' + roIdParam, JSON.stringify(roData));

    const isClockedIn = !!activeSession;

    // Only show service types on this RO, auto-select if just one
        roServiceTypes = roData.repair_type
            ? roData.repair_type.split(',').map(s => s.trim()).filter(s => ALL_SERVICE_TYPES.includes(s))
            : ALL_SERVICE_TYPES.slice();
        if (!selectedService && roServiceTypes.length === 1) {
            selectedService = roServiceTypes[0];
        }

    document.getElementById('app').innerHTML = `
        <div id="syncBanner" class="sync-banner" style="display:none;"></div>

        ${window._autoClockoutMsg ? `
        <div class="auto-clockout-banner">
            ✅ ${window._autoClockoutMsg}
        </div>` : ''}

        <div class="ro-info">
            <h2>${t('📋 Repair Order')}</h2>
            <div class="info-row">
                <span class="info-label">${t('Customer')}</span>
                <span class="info-value">${roData.customer_name || '—'}</span>
            </div>
            <div class="info-row">
                <span class="info-label">${t('RV')}</span>
                <span class="info-value">${roData.rv || '—'}</span>
            </div>
            <div class="info-row">
                <span class="info-label">${t('RO ID')}</span>
                <span class="info-value" style="font-family:monospace;font-size:12px;">${roData.ro_id}</span>
            </div>
            <div class="info-row">
                <span class="info-label">${t('Status')}</span>
                <span class="info-value">${roData.status || '—'}</span>
            </div>
            <div class="info-row">
                <span class="info-label">${t('Technician')}</span>
                <span class="info-value">${roData.technician || '—'}</span>
            </div>
            <div class="info-row">
                <span class="info-label">${t('Your Status')}</span>
                <span class="status-badge ${isClockedIn ? 'checked-in' : 'checked-out'}">
                    ${isClockedIn ? t('🟢 Clocked In') : t('🔴 Not Clocked In')}
                </span>
            </div>
            ${isClockedIn ? `
            <div class="info-row">
                <span class="info-label">${t('Clocked In')}</span>
                <span class="info-value">${new Date(activeSession.clock_in).toLocaleTimeString()}</span>
            </div>` : ''}
        </div>

        ${isClockedIn ? `
        <div class="timer">
            <h3>${t('⏱ Time on this RO')}</h3>
            <div class="timer-display" id="timerDisplay">00:00:00</div>
        </div>` : ''}

        <div class="service-types">
            <h3>${t('Service Type')} <span style="color:#ef4444;">*</span></h3>
            <p style="font-size:12px;color:#94a3b8;margin-bottom:8px;">${t('Select one service to work on')}</p>
            <div class="service-grid">
                ${roServiceTypes.map(s => `
                    <div class="service-chip ${selectedService === s ? 'selected' : ''}"
                         onclick="selectService('${s}')">
                        ${s}
                    </div>`).join('')}
            </div>
        </div>

        <div class="notes-section">
            <h3>${t('Work Notes')}</h3>
            <div class="notes-toolbar">
                <button class="btn-dictate" id="dictateBtn" onclick="toggleDictation()">${t('🎤 Dictate')}</button>
            </div>
            <textarea id="workNotes" placeholder="${t('Describe work performed...')}">${activeSession?.work_notes || ''}</textarea>
        </div>

        <div class="action-buttons">
            ${isClockedIn ? `
                <button class="btn btn-end" onclick="clockOut()">${t('🔴 Clock Out')}</button>
            ` : `
                <button class="btn btn-start" onclick="clockIn()">${t('🟢 Clock In / Start Work')}</button>
            `}
            <button class="btn btn-secondary" onclick="window.close()">${t('Close')}</button>
        </div>

        <div style="text-align:center;margin-top:16px;font-size:12px;color:#94a3b8;">
            ${t('Signed in as')} ${currentUser?.name || 'Unknown'} (${currentUser?.email || ''})
            &nbsp;·&nbsp;
            <span onclick="signOut()" style="color:#3b82f6;cursor:pointer;text-decoration:underline;">${t('Switch account')}</span>
        </div>
    `;

    updateSyncBanner();
    // Clear one-time auto clock-out message
    window._autoClockoutMsg = null;

    if (isClockedIn) {
        startTimer(new Date(activeSession.clock_in));
    }
}

// ── Service Type Select (single) ─────────────────────────────
function selectService(type) {
    selectedService = (selectedService === type) ? null : type;
    document.querySelectorAll('.service-chip').forEach(chip => {
        chip.classList.toggle('selected', chip.textContent.trim() === selectedService);
    });
}

// ── Clock In ─────────────────────────────────────────────────
async function clockIn() {
    if (!selectedService) {
        alert(t('Please select a service type before clocking in.'));
        return;
    }

    const now = new Date().toISOString();
    const notes = document.getElementById('workNotes')?.value || '';

    const logData = {
        ro_id:         roData.id,
        tech_email:    currentUser.email,
        tech_name:     currentUser.name,
        clock_in:      now,
        clock_out:     null,
        service_type:  selectedService,
        work_notes:    notes,
        duration_seconds: 0,
    };

    try {
        if (isOnline) {
            const { data, error } = await getSB().from('time_logs').insert(logData).select().single();
            if (error) throw error;
            activeSession = data;
            console.log('✅ Clocked in:', activeSession.id);
        } else {
            // Store locally with temp ID
            const tempId = 'offline_' + Date.now();
            activeSession = { ...logData, id: tempId, _offline: true };
            await queueOfflineAction({ type: 'clock_in', data: logData, tempId });
            console.log('📵 Clock-in queued for sync');
        }

        // Cache session locally
        localStorage.setItem('prvs_session_' + roIdParam + '_' + currentUser.email, JSON.stringify(activeSession));

        // Update RO status to In Progress if not already
        if (isOnline && roData.status !== 'In Progress') {
            await getSB().from('repair_orders').update({
                status: 'In Progress',
                pct_complete: 60,
                updated_at: now,
            }).eq('id', roData.id);
            roData.status = 'In Progress';
        }

        render();
    } catch(e) {
        console.error('Clock-in error:', e);
        alert('Error clocking in: ' + e.message);
    }
}

// ── Clock Out ────────────────────────────────────────────────
async function clockOut() {
    if (!activeSession) return;

    const now      = new Date().toISOString();
    const duration = Math.round((new Date(now) - new Date(activeSession.clock_in)) / 1000);
    const notes    = document.getElementById('workNotes')?.value || activeSession.work_notes || '';
    const services = selectedService || activeSession.service_type || '';

    const updateData = {
        clock_out:        now,
        duration_seconds: duration,
        work_notes:       notes,
        service_type:     selectedService || activeSession.service_type || '',
        updated_at:       now,
    };

    try {
        if (isOnline && !activeSession._offline) {
            const { error } = await getSB().from('time_logs').update(updateData).eq('id', activeSession.id);
            if (error) throw error;
            console.log('✅ Clocked out. Duration:', Math.round(duration / 60), 'minutes');
        } else {
            await queueOfflineAction({ type: 'clock_out', logId: activeSession.id, data: updateData });
            console.log('📵 Clock-out queued for sync');
        }

        // Clear local session
        localStorage.removeItem('prvs_session_' + roIdParam + '_' + currentUser.email);
        activeSession = null;

        stopTimer();
        showClockOutSummary(duration, notes, services);

    } catch(e) {
        console.error('Clock-out error:', e);
        alert('Error clocking out: ' + e.message);
    }
}

function showClockOutSummary(durationSec, notes, services) {
    const mins  = Math.floor(durationSec / 60);
    const hours = Math.floor(mins / 60);
    const rem   = mins % 60;
    const timeStr = hours > 0 ? `${hours}h ${rem}m` : `${mins}m`;

    document.getElementById('app').innerHTML = `
        <div style="text-align:center;padding:20px 0;">
            <div style="font-size:64px;margin-bottom:16px;">✅</div>
            <h2 style="color:#166534;font-size:24px;margin-bottom:8px;">${t('Clocked Out!')}</h2>
            <p style="color:#64748b;margin-bottom:24px;">${t('Your time has been recorded.')}</p>

            <div style="background:#f0fdf4;border-radius:12px;padding:20px;margin-bottom:20px;text-align:left;">
                <div class="info-row" style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #dcfce7;">
                    <span style="color:#64748b;font-size:14px;">${t('Customer')}</span>
                    <span style="font-weight:600;font-size:14px;">${roData.customer_name}</span>
                </div>
                <div class="info-row" style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #dcfce7;">
                    <span style="color:#64748b;font-size:14px;">${t('Time Worked')}</span>
                    <span style="font-weight:700;font-size:14px;color:#166534;">${timeStr}</span>
                </div>
                <div class="info-row" style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #dcfce7;">
                    <span style="color:#64748b;font-size:14px;">${t('Services')}</span>
                    <span style="font-weight:600;font-size:13px;">${services || '—'}</span>
                </div>
                ${notes ? `
                <div style="padding:6px 0;">
                    <span style="color:#64748b;font-size:14px;display:block;margin-bottom:4px;">${t('Notes')}</span>
                    <span style="font-size:13px;color:#1e293b;">${notes}</span>
                </div>` : ''}
            </div>

            <button class="btn btn-start" style="width:100%;" onclick="loadAndRender()">
                ${t('🔄 Clock Back In')}
            </button>
        </div>`;
}

// ── Timer ─────────────────────────────────────────────────────
function startTimer(startTime) {
    stopTimer();
    timerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const h = Math.floor(elapsed / 3600).toString().padStart(2, '0');
        const m = Math.floor((elapsed % 3600) / 60).toString().padStart(2, '0');
        const s = (elapsed % 60).toString().padStart(2, '0');
        const el = document.getElementById('timerDisplay');
        if (el) el.textContent = `${h}:${m}:${s}`;
    }, 1000);
}

function stopTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

// ── Voice Dictation ───────────────────────────────────────────
function toggleDictation() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('Voice dictation not supported in this browser. Try Chrome on Android or iOS Safari.');
        return;
    }

    if (isRecording) {
        recognition?.stop();
        return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = false;
    recognition.lang = 'en-US';

    recognition.onstart = () => {
        isRecording = true;
        const btn = document.getElementById('dictateBtn');
        if (btn) { btn.textContent = t('⏹ Stop Dictating'); btn.classList.add('recording'); }
    };

    recognition.onresult = (e) => {
        const textarea = document.getElementById('workNotes');
        if (!textarea) return;
        const transcript = Array.from(e.results).map(r => r[0].transcript).join(' ');
        textarea.value = (textarea.value ? textarea.value + ' ' : '') + transcript;
    };

    recognition.onend = () => {
        isRecording = false;
        const btn = document.getElementById('dictateBtn');
        if (btn) { btn.textContent = t('🎤 Dictate'); btn.classList.remove('recording'); }
    };

    recognition.onerror = (e) => {
        console.warn('Speech error:', e.error);
        isRecording = false;
        const btn = document.getElementById('dictateBtn');
        if (btn) { btn.textContent = t('🎤 Dictate'); btn.classList.remove('recording'); }
    };

    recognition.start();
}


// ── Sign Out ──────────────────────────────────────────────────
function signOut() {
    localStorage.removeItem('prvs_user_identity');
    localStorage.removeItem('prvs_checkin_user');
    currentUser = null;
    activeSession = null;
    if (typeof google !== 'undefined') google.accounts.id.disableAutoSelect();
    showSignIn();
}

// ── Helpers ───────────────────────────────────────────────────
function showLoading(msg = 'Loading...') {
    document.getElementById('app').innerHTML = `<div class="loading">⏳ ${msg}</div>`;
}

function showError(msg) {
    document.getElementById('app').innerHTML = `<div class="error">❌ ${msg}</div>`;
}
</script>
